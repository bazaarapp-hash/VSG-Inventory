// ── Simple hash (cukup untuk app inventaris lokal) ──────────
// SHA-256 via Web Crypto API (async)
async function secureHash(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// Sync wrapper — dipakai hanya untuk backward compat sementara
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return btoa(String(h + 2147483648));
}

// ── Session management via sessionStorage ───────────────────
const SESSION_KEY = 'simba_session';
function saveSession(user) {

}

const fmt = {
  date(ts) {
    if (!ts) return '–';
    let d = ts?.toDate?.() || (ts instanceof Date ? ts : new Date(ts));
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  },
  dt(ts) {
    if (!ts) return '–';
    let d = ts?.toDate?.() || (ts instanceof Date ? ts : new Date(ts));
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  },
};

function mkKode() {
  const y = String(new Date().getFullYear()).slice(-2);
  const m = String(new Date().getMonth()+1).padStart(2,'0');
  const r = Math.random().toString(36).substr(2,4).toUpperCase();
  return `BRG-${y}${m}-${r}`;
}

function roleLabel(r) {
  return {superadmin:'Super Admin', admin:'Admin', manager:'Manager Perlengkapan'}[r] || r || '–';
}

function toast(msg, type='ok') {
  const c = document.getElementById('toasts');
  const cls = {ok:'t-ok', err:'t-err', inf:'t-inf'}[type]||'t-inf';
  const icon= {ok:'✓', err:'✕', inf:'ℹ'}[type]||'ℹ';
  const el = document.createElement('div');
  el.className = `toast ${cls}`;
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 3600);

function can(a) {

  if (a === 'reports')  return ['admin','manager'].includes(r);

  }
}

const MAX_ATTEMPTS = 5;       // Maks percobaan gagal
const LOCK_MINUTES = 30;      // Durasi kunci otomatis (menit)

async function doLogin(username, pw) {
  // Cari user berdasarkan username
  const snap = await db.collection('users')
    .where('username', '==', username.trim().toLowerCase())
    .limit(1).get();
  if (snap.empty) throw new Error('Username tidak ditemukan');

  const docRef = snap.docs[0].ref;
  const data   = snap.docs[0].data();
  const now    = new Date();

  // Cek akun nonaktif
  if (data.active === false) throw new Error('Akun dinonaktifkan. Hubungi administrator.');

  // Cek terkunci
  if (data.locked === true) {
    if (data.lockedUntil) {
      const until = data.lockedUntil.toDate ? data.lockedUntil.toDate() : new Date(data.lockedUntil);
      if (now < until) {
        const sisaMenit = Math.ceil((until - now) / 60000);
        throw new Error(
          'Akun terkunci karena terlalu banyak percobaan gagal.\n' +
          'Kunci otomatis lepas dalam ' + sisaMenit + ' menit, atau hubungi Admin untuk dibuka.'
        );
      } else {
        // Kunci sudah kedaluwarsa — lepas otomatis
        await docRef.update({ locked: false, failedAttempts: 0, lockedUntil: null });
        data.locked = false; data.failedAttempts = 0;
      }
    } else {
      throw new Error('Akun terkunci. Hubungi Super Admin atau Admin untuk membukanya.');
    }
  }

  // Cek password — coba SHA-256 dulu, fallback ke simpleHash (migrasi)
  const sha256Hash = await secureHash(pw);
  const oldHash    = simpleHash(pw);
  const match      = data.passwordHash === sha256Hash || data.passwordHash === oldHash;

  if (!match) {
    // Tambah hitungan gagal
    const attempts = (data.failedAttempts || 0) + 1;
    const updates  = { failedAttempts: attempts, lastFailedAt: FS.FieldValue.serverTimestamp() };

    if (attempts >= MAX_ATTEMPTS) {
      // Kunci akun
      const lockUntil = new Date(now.getTime() + LOCK_MINUTES * 60000);
      updates.locked      = true;
      updates.lockedAt    = FS.FieldValue.serverTimestamp();
      updates.lockedUntil = lockUntil;
      await docRef.update(updates);
      throw new Error(
        'Password salah. Akun terkunci selama ' + LOCK_MINUTES + ' menit ' +
        'karena ' + MAX_ATTEMPTS + 'x percobaan gagal.\nHubungi Admin untuk membuka lebih cepat.'
      );
    } else {
      await docRef.update(updates);
      const sisa = MAX_ATTEMPTS - attempts;
      throw new Error('Password salah. Sisa percobaan: ' + sisa + ' kali lagi.');
    }
  }

  // Login berhasil — reset hitungan gagal + upgrade hash ke SHA-256 jika masih pakai lama
  const resetUpdate = { failedAttempts: 0, locked: false, lastLogin: FS.FieldValue.serverTimestamp() };
  if (data.passwordHash === oldHash && data.passwordHash !== sha256Hash) {
    resetUpdate.passwordHash = sha256Hash; // migrasi otomatis ke SHA-256
  }
  await docRef.update(resetUpdate);

  return { ...data, id: snap.docs[0].id };
}

async function dbItem(id) {

    updatedAt:now, updatedBy:S.user.uid, updatedByName:S.user.nama,

// ─── PEMINJAMAN: multi-entry per item ──────────────────────────
// peminjaman disimpan sebagai array [{nama, jumlah, tgl}]
async function dbTambahPinjam(itemId, nama, jumlah) {
  const item = await dbItem(itemId);
  if (!item) throw new Error('Barang tidak ditemukan');
  const pinjamList = item.pinjamList || [];
  const totalPinjam = pinjamList.reduce((s,p)=>s+p.jumlah,0);
  const stok = item.jumlah - totalPinjam;
  if (jumlah > stok) throw new Error(`Stok tersedia hanya ${stok}`);
  pinjamList.push({ nama: nama.trim(), jumlah, tgl: new Date().toISOString().slice(0,10), id: 'p'+Date.now() });
  const now = FS.FieldValue.serverTimestamp();
  await db.collection('items').doc(itemId).update({
    pinjamList, updatedAt:now, updatedBy:S.user.uid, updatedByName:S.user.nama
  });
  await dbLog(itemId, item.kode, item.nama, 'pinjam', {}, { nama, jumlah });
}
async function dbKembalikanPinjam(itemId, pinjamId) {
  const item = await dbItem(itemId);
  const pinjamList = (item.pinjamList||[]).filter(p=>p.id!==pinjamId);
  const now = FS.FieldValue.serverTimestamp();
  await db.collection('items').doc(itemId).update({
    pinjamList, updatedAt:now, updatedBy:S.user.uid, updatedByName:S.user.nama
  });
  await dbLog(itemId, item.kode, item.nama, 'kembali', {}, { pinjamId });
}

async function dbUsers() {
  const s = await db.collection('users').orderBy('createdAt','desc').get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function dbCreateUser(data) {
  // Cek username tidak duplikat
  const chk = await db.collection('users')
    .where('username','==',data.username.trim().toLowerCase()).limit(1).get();
  if (!chk.empty) throw new Error('Username sudah digunakan');
  const id   = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  const hash = await secureHash(data.password);
  await db.collection('users').doc(id).set({
    uid: id,
    nama: data.nama,
    username: data.username.trim().toLowerCase(),
    passwordHash: hash,
    role: data.role,
    active: true,
    failedAttempts: 0,
    locked: false,
    createdAt: FS.FieldValue.serverTimestamp(),
    createdBy: S.user.uid,
    createdByName: S.user.nama,
  });
  return id;
}
async function dbUpdateUser(id, data) {
  const upd = {
    nama: data.nama, role: data.role, active: data.active,
    updatedAt: FS.FieldValue.serverTimestamp(), updatedBy: S.user.uid,
  };
  if (data.username) upd.username = data.username.trim().toLowerCase();
  if (data.password) upd.passwordHash = await secureHash(data.password);
  await db.collection('users').doc(id).update(upd);
}
async function dbDeleteUser(id) {
  if (id === S.user.uid || id === S.user.id) throw new Error('Tidak bisa hapus akun sendiri');
  await db.collection('users').doc(id).delete();
}

async function dbChangeMyPassword(oldPw, newPw) {
  // Verifikasi password lama dulu
  const doc = await db.collection('users').doc(S.user.id || S.user.uid).get();
  if (!doc.exists) throw new Error('Akun tidak ditemukan');
  const oldHash = simpleHash(oldPw);
  const oldHashNew = await secureHash(oldPw);
  if (doc.data().passwordHash !== oldHash && doc.data().passwordHash !== oldHashNew) throw new Error('Password lama salah');
  const newHash = await secureHash(newPw);
  await db.collection('users').doc(S.user.id || S.user.uid).update({
    passwordHash: newHash,
    updatedAt: FS.FieldValue.serverTimestamp(),
  });
}

// ── Warna helpers – GLOBAL agar bisa dipanggil di mana saja ──
function lighten(h, a) {
  try {
    const r = Math.min(255, parseInt(h.slice(1,3),16)+a);
    const g = Math.min(255, parseInt(h.slice(3,5),16)+a);
    const b = Math.min(255, parseInt(h.slice(5,7),16)+a);
    return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
  } catch(e) { return h; }
}
function darken(h, a) {
  try {
    const r = Math.max(0, parseInt(h.slice(1,3),16)-a);
    const g = Math.max(0, parseInt(h.slice(3,5),16)-a);
    const b = Math.max(0, parseInt(h.slice(5,7),16)-a);
    return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
  } catch(e) { return h; }
}

function applyTheme() {
  const t = S.theme;
  const root = document.documentElement;
  root.style.setProperty('--primary',   t.colorPrimary);
  root.style.setProperty('--primary-l', lighten(t.colorPrimary, 30));
  root.style.setProperty('--primary-ll',lighten(t.colorPrimary, 60));
  root.style.setProperty('--accent',    t.colorAccent);
  root.style.setProperty('--accent-l',  lighten(t.colorAccent, 28));
  root.style.setProperty('--bg',        t.colorBg);
  // Ukuran font
  const fs = {small:'12px', normal:'13.5px', large:'15.5px'}[t.fontSize||'normal'] || '13.5px';
  document.body.style.fontSize = fs;
  document.title = t.appTitle + ' – Inventaris';
  document.querySelectorAll('.login-wrap').forEach(el=>{
    el.style.background = `linear-gradient(150deg,${darken(t.colorPrimary,20)} 0%,${t.colorPrimary} 45%,${lighten(t.colorPrimary,25)} 100%)`;
  });
}

function logoHtml(size='40px', forDark=false) {
  const t = S.theme;
  if (t.logoType === 'image' && t.logoBase64) {
    // width:100% agar center mengikuti parent (sidebar pakai text-align:center)
    return `<div style="width:100%;display:flex;align-items:center;justify-content:center;margin:0 auto">` +
           `<img src="${t.logoBase64}" style="width:${size};height:${size};object-fit:contain;border-radius:10px;display:block;margin:0 auto">` +

  }
  return `<span style="font-size:${size};line-height:1;display:inline-flex;align-items:center;justify-content:center">${t.logoEmoji||'🕌'}</span>`;
}

async function needsSetup() {

    const s = await db.collection('users').limit(1).get();
    return s.empty;
  } catch(e) {
    console.warn('needsSetup error:', e.message);
    return false; // Asumsikan sudah ada user → tampilkan login
  }
}
async function setupSuperAdmin(nama, email, pw) {
  // Cek apakah sudah ada superadmin (dengan fallback jika rules blok)
  try {
    const existing = await db.collection('users')
      .where('role','==','superadmin').limit(1).get();
    if (!existing.empty) {
      throw { code: 'superadmin-exists', message: 'Superadmin sudah terdaftar.' };
    }
  } catch(chkErr) {
    if (chkErr.code === 'superadmin-exists') throw chkErr;
    console.warn('Cek superadmin gagal (rules?):', chkErr.code);
  }

  let authUser = null;
  try {
    // Step 1: Buat akun di Firebase Auth
    const c = await auth.createUserWithEmailAndPassword(email, pw);
    authUser = c.user;

    // Step 2: Simpan dokumen ke Firestore
    await db.collection('users').doc(authUser.uid).set({
      uid: authUser.uid, nama, email, role: 'superadmin', active: true,
      createdAt: FS.FieldValue.serverTimestamp(),
      createdBy: authUser.uid, createdByName: nama,
    });
  } catch(err) {
    // Jika Firestore gagal SETELAH Auth berhasil → hapus akun Auth agar tidak jadi zombie
    if (authUser && err.code === 'permission-denied') {
      try { await authUser.delete(); } catch(delErr) { console.warn('Gagal hapus auth user:', delErr); }
      throw {
        code: 'firestore-rules-not-set',
        message: 'Firestore Rules belum dipublish! Akun Auth yang terbuat sudah dihapus otomatis. Publish Rules dulu lalu coba lagi.'
      };
    }
    throw err;
  }
}

//  BACKUP / RESTORE / RESET
// ═══════════════════════════════════════════════════════════════
async function doBackup() {
  toast('Menyiapkan backup…','inf');
  try {
    const [items, users, history] = await Promise.all([
      db.collection('items').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
      db.collection('users').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
      db.collection('history').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
    ]);
    const blob = new Blob([JSON.stringify({
      exportedAt:new Date().toISOString(), exportedBy:S.user.nama, version:'1.0',
      data:{items, users, history}
    },null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup-simba-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    toast('Backup berhasil diunduh!');
  } catch(e){ toast('Gagal backup: '+e.message,'err'); }
}
async function doRestore(file) {
  try {
    const bk = JSON.parse(await file.text());
    if (!bk.data) throw new Error('Format backup tidak valid');
    toast('Memulai restore…','inf');
    const batch = db.batch();
    (bk.data.items||[]).forEach(({id,...d})=>batch.set(db.collection('items').doc(id),d));
    await batch.commit();
    toast(`Restore selesai – ${bk.data.items?.length||0} barang dipulihkan`);
    go('dashboard');
  } catch(e){ toast('Gagal restore: '+e.message,'err'); }
}
async function doReset() {
  toast('Menghapus data…','inf');
  try {
    for (const col of ['items','history']) {
      const s = await db.collection(col).get();
      const b = db.batch(); s.docs.forEach(d=>b.delete(d.ref)); await b.commit();
    }
    toast('Reset berhasil!');
    go('dashboard');
  } catch(e){ toast('Gagal reset: '+e.message,'err'); }
}

  const sb  = document.getElementById('sidebar');
  const ov  = document.getElementById('sb-overlay');
  if (sb)  sb.classList.toggle('open');
  if (ov)  ov.classList.toggle('show');
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  if (sb)  sb.classList.remove('open');
  if (ov)  ov.classList.remove('show');
}

// ── FORM BARANG ────────────────────────────────────────────────
function tplFormBarang() {
  const it = S.item, ed = !!it;
  const v  = (k,d='') => it?.[k]??d;
  const sel= (a,b) => a===b?'selected':'';

  const pinjamList  = it?.pinjamList || [];
  const totalPinjam = pinjamList.reduce((s,p)=>s+p.jumlah,0);

  return `

    <div class="ph">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

          </div>

            <input class="inp" type="number" name="jumlah" value="${v('jumlah',1)}" min="0" required>
          </div>
          <div class="fgrp">
            <label class="lbl">Tanggal Diperoleh</label>
            <input class="inp" type="date" name="tanggalDiperoleh" value="${v('tanggalDiperoleh')}">
          </div>
          <div class="fgrp">
            <label class="lbl">Diperoleh Dari</label>
            <input class="inp" name="diperolehDari" value="${v('diperolehDari')}" placeholder="Nama donatur / lembaga">
          </div>
          <div class="fgrp" style="grid-column:1/-1">
            <label class="lbl">Lokasi Penempatan</label>
            <select class="inp" name="lokasi" onchange="onLokasiChange(this)">
              <option value="">Pilih lokasi…</option>

          </div>

          <!-- STATUS -->
          <div class="fgrp">
            <label class="lbl">Status / Kondisi *</label>
            <div class="radio-group">
              <label class="radio-item"><input type="radio" name="status" value="aktif" ${chk(v('status','aktif'),'aktif')}> <span class="bdg bdg-g">✓ Aktif</span></label>

            </div>
          </div>

          <!-- PERAWATAN -->

            <label class="lbl">Jadwal Perawatan</label>
            <div class="radio-group">
              <label class="radio-item"><input type="radio" name="jadwal" value="ada" ${chk(v('jadwalPerawatan','tidak'),'ada')} onchange="toggleSection('sec-rawat',true)"> Ada</label>
              <label class="radio-item"><input type="radio" name="jadwal" value="tidak" ${chk(v('jadwalPerawatan','tidak'),'tidak')} onchange="toggleSection('sec-rawat',false)"> Tidak Ada</label>

          <div id="sec-rawat" style="grid-column:1/-1;${v('jadwalPerawatan')==='ada'?'':'display:none'}">

              <div class="fgrp"><label class="lbl">Interval Perawatan</label>
                <select class="inp" name="intervalRawat">
                  ${[['7','Setiap 1 minggu'],['14','Setiap 2 minggu'],['30','Setiap 1 bulan'],['60','Setiap 2 bulan'],['90','Setiap 3 bulan'],['180','Setiap 6 bulan'],['365','Setiap 1 tahun']].map(([v2,l])=>`<option value="${v2}" ${v('intervalRawat','30')===v2?'selected':''}>${l}</option>`).join('')}

              <div class="fgrp"><label class="lbl">Tanggal Perawatan Terakhir</label>

                <input class="inp" name="detailPerawatan" value="${v('detailPerawatan')}" placeholder="Contoh: Servis rutin, pembersihan, dll">
              </div>
            </div>
          </div>

          <!-- STOK TERSEDIA (edit mode) -->
          ${ed?`<div style="grid-column:1/-1;background:var(--bg);border-radius:10px;padding:12px 14px">
            <div style="font-size:12.5px;font-weight:600;margin-bottom:6px">📊 Info Stok</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px">
              <span>Total: <strong>${v('jumlah')}</strong></span>
              <span>Dipinjam: <strong style="color:var(--warn)">${totalPinjam}</strong></span>
              <span>Tersedia: <strong style="color:var(--success)">${stokTersedia}</strong></span>
            </div>
            ${pinjamList.length?`<div style="margin-top:8px">
              <div style="font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px">Sedang dipinjam:</div>
              ${pinjamList.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12.5px">
                <span style="flex:1"><strong>${p.nama}</strong> — ${p.jumlah} unit (${p.tgl||'–'})</span>
                <button type="button" class="abt ad" onclick="kembalikanPinjam('${it.id}','${p.id}')">Kembalikan</button>
              </div>`).join('')}
            </div>`:''}
          </div>`:''}

          <!-- INFO PEMINJAMAN — link ke halaman Peminjaman untuk tambah/kembalikan -->
          <div id="sec-pinjam-form" style="grid-column:1/-1;${bisDipinjam===false?'display:none':''}">
            <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
              <div style="font-size:12.5px;color:#1D4ED8">
                🔄 Untuk menambah atau mengembalikan peminjaman, gunakan menu <strong>Peminjaman Barang</strong>
              </div>
              <button type="button" class="btn btn-primary" style="font-size:12px;padding:7px 14px;white-space:nowrap" onclick="go('peminjaman')">Ke Peminjaman →</button>
            </div>
          </div>

        </div>
        <div style="display:flex;gap:10px;padding-top:14px;border-top:1px solid var(--border);margin-top:8px">
          <button type="submit" class="btn btn-accent" id="sbmt-btn">${ed?'💾 Simpan Perubahan':'+ Tambah Barang'}</button>
          <button type="button" class="btn btn-outline" onclick="go('barang')">Batal</button>
        </div>
      </form>
    </div>
  </div>`;
}

// ── PEMINJAMAN BARANG ──────────────────────────────────────────
function tplPeminjaman() {
  const items  = (_items||[]).filter(i => i.bisaDipinjam !== false);
  const active = items.filter(i => (i.pinjamList||[]).length > 0);
  const avail  = items.filter(i => !(i.pinjamList||[]).length);

  const cardItem = (it) => {
    const pl          = it.pinjamList || [];
    const totalPinjam = pl.reduce((s,p)=>s+p.jumlah, 0);
    const stok        = Math.max(0, it.jumlah - totalPinjam);
    return `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:600;font-size:14px">${it.nama}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            ${it.jenis||'–'} · ${it.lokasi||'–'} · Kode: <span style="font-family:monospace">${it.kode||'–'}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;font-size:13px;flex-shrink:0">
          <div style="text-align:center"><div style="font-weight:700;font-size:18px">${it.jumlah||0}</div><div style="color:var(--muted);font-size:11px">Total</div></div>
          <div style="text-align:center"><div style="font-weight:700;font-size:18px;color:var(--warn)">${totalPinjam}</div><div style="color:var(--muted);font-size:11px">Dipinjam</div></div>
          <div style="text-align:center"><div style="font-weight:700;font-size:18px;color:${stok>0?'var(--success)':'var(--danger)'}">${stok}</div><div style="color:var(--muted);font-size:11px">Tersedia</div></div>
        </div>
      </div>

      ${pl.length ? `
      <div style="margin:10px 0 8px;border-top:1px solid var(--border);padding-top:8px">
        <div style="font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px">SEDANG DIPINJAM:</div>
        ${pl.map(p=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FEF3C7;border-radius:8px;margin-bottom:5px">
          <span style="font-size:15px">📤</span>
          <div style="flex:1">
            <span style="font-weight:600">${p.nama}</span>
            <span style="color:var(--muted);font-size:12px"> — ${p.jumlah} unit · ${p.tgl||'–'}</span>
          </div>
          <button class="abt ad" onclick="kembalikanPinjamanPage('${it.id}','${p.id}','${p.nama.replace(/'/g,"\'")}')">Kembalikan</button>
        </div>`).join('')}
      </div>` : ''}

      ${stok > 0 ? `
      <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:10px 12px;margin-top:8px">
        <div style="font-size:12.5px;font-weight:600;color:#1D4ED8;margin-bottom:8px">➕ Tambah Peminjaman</div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
          <div style="flex:1;min-width:140px">
            <div class="lbl">Nama Peminjam</div>

async function tambahPinjamanPage(itemId) {
  const nama = document.getElementById('pn-nama-'+itemId)?.value?.trim();
  const jml  = parseInt(document.getElementById('pn-jml-'+itemId)?.value || 1);
  if (!nama) { toast('Isi nama peminjam', 'err'); return; }
  try {
    await dbTambahPinjam(itemId, nama, jml);
    toast('✓ Peminjaman berhasil dicatat!');
    // Reload items dari Firestore lalu render ulang halaman
    _items = await dbItems();
    hitungNotif();
    document.querySelector('.content').innerHTML = tplPeminjaman();
  } catch(ex) { toast(ex.message, 'err'); }
}

async function kembalikanPinjamanPage(itemId, pinjamId, namaPeminjam) {
  if (!confirm(`Kembalikan pinjaman dari "${namaPeminjam}"?`)) return;
  try {
    await dbKembalikanPinjam(itemId, pinjamId);
    toast('✓ Barang dikembalikan!');
    _items = await dbItems();
    hitungNotif();
    document.querySelector('.content').innerHTML = tplPeminjaman();
  } catch(ex) { toast(ex.message, 'err'); }
}

// ── NOTIFIKASI ─────────────────────────────────────────────────
function tplNotifikasi() {
  const today = new Date();
  const items = _items;
  const rawatItems = items.filter(i=>i.jadwalPerawatan==='ada');
  const alerts = rawatItems.map(i=>{
    if (!i.tglRawatTerakhir) return {item:i, status:'unknown', hari:null};
    const last  = new Date(i.tglRawatTerakhir);
    const next  = new Date(last);
    next.setDate(next.getDate() + parseInt(i.intervalRawat||30));
    const selisih = Math.ceil((next-today)/(1000*60*60*24));
    return {item:i, status: selisih<0?'overdue':selisih<=7?'soon':'ok', hari:selisih, tglNext:next};
  }).sort((a,b)=>(a.hari??999)-(b.hari??999));

  const overdue = alerts.filter(a=>a.status==='overdue');
  const soon    = alerts.filter(a=>a.status==='soon');
  const ok      = alerts.filter(a=>a.status==='ok');
  const unknown = alerts.filter(a=>a.status==='unknown');

  const card = (a,cls,ic) => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${cls==='ov'?'#FEF2F2':cls==='sn'?'#FEF3C7':'#F0FDF4'};border-radius:10px;margin-bottom:8px;border:1px solid ${cls==='ov'?'#FECACA':cls==='sn'?'#FDE68A':'#BBF7D0'}">
      <span style="font-size:22px">${ic}</span>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13.5px">${a.item.nama}</div>
        <div style="font-size:11.5px;color:var(--muted)">${a.item.lokasi||'–'} · ${a.item.jenis||'–'}</div>
        <div style="font-size:12px;color:${cls==='ov'?'var(--danger)':cls==='sn'?'var(--warn)':'var(--success)'}">
          ${cls==='ov'?`Terlambat ${Math.abs(a.hari)} hari`:cls==='sn'?`${a.hari} hari lagi`:cls==='ok'?`${a.hari} hari lagi`:'Belum ada catatan'}
          ${a.tglNext?' · Jadwal: '+a.tglNext.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):''}
        </div>
        ${a.item.detailPerawatan?`<div style="font-size:11px;color:var(--muted);margin-top:2px">📌 ${a.item.detailPerawatan}</div>`:''}
      </div>
      <button class="abt ae" onclick="editItem('${a.item.id}')">Update</button>
    </div>`;

  return `
  <div class="ph"><div><h1 class="ff">Notifikasi Perawatan</h1><p>Monitor jadwal perawatan semua barang</p></div></div>
  ${!rawatItems.length?'<div class="card" style="text-align:center;padding:40px"><p style="color:var(--muted)">Tidak ada barang dengan jadwal perawatan.</p></div>':''}
  ${overdue.length?`<div class="card" style="margin-bottom:14px;border-color:#FECACA">
    <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:10px">🔴 Terlambat (${overdue.length})</div>
    ${overdue.map(a=>card(a,'ov','🚨')).join('')}
  </div>`:''}
  ${soon.length?`<div class="card" style="margin-bottom:14px;border-color:#FDE68A">
    <div style="font-size:13px;font-weight:700;color:var(--warn);margin-bottom:10px">🟡 Dalam 7 Hari (${soon.length})</div>
    ${soon.map(a=>card(a,'sn','⚠️')).join('')}
  </div>`:''}
  ${ok.length?`<div class="card" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--success);margin-bottom:10px">🟢 Terjadwal Baik (${ok.length})</div>
    ${ok.map(a=>card(a,'ok','✅')).join('')}
  </div>`:''}
  ${unknown.length?`<div class="card">
    <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">⚪ Belum Ada Catatan (${unknown.length})</div>
    ${unknown.map(a=>card(a,'un','❓')).join('')}
  </div>`:''}`;
}

async function handleRepair(e) {
  e.preventDefault();
  const nama = document.getElementById('rp-nama').value.trim();
  const err  = document.getElementById('rp-err');
  const btn  = document.getElementById('rp-btn');
  const fbUser = S._repairUser;
  if (!fbUser) { S.page='login'; render(); return; }
  btn.disabled = true; btn.textContent = 'Menyimpan…';
  try {
    await db.collection('users').doc(fbUser.uid).set({
      uid: fbUser.uid, nama, email: fbUser.email,
      role: 'superadmin', active: true,
      createdAt: FS.FieldValue.serverTimestamp(),
      createdBy: fbUser.uid, createdByName: nama,
    });
    S.user = { uid: fbUser.uid, nama, email: fbUser.email, role: 'superadmin', active: true };
    S._repairUser = null;
    toast('✓ Data berhasil disimpan! Selamat datang, ' + nama);
    go('dashboard');
  } catch(ex) {
    console.error('repair error:', ex.code, ex.message);
    const msg = ex.code === 'permission-denied'
      ? '❌ Masih permission-denied. Publish Firestore Rules dulu, lalu refresh halaman ini.'
      : 'Gagal: ' + ex.message;
    err.textContent = msg;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = '✅ Lengkapi Data & Masuk';
  }
}

    case 'notifikasi':   break;

}

function hitungNotif() {
  if (!_items.length) return;
  const today = new Date();
  S._notifCount = _items.filter(i=>{
    if (i.jadwalPerawatan!=='ada' || !i.tglRawatTerakhir) return false;
    const last=new Date(i.tglRawatTerakhir), next=new Date(last);
    next.setDate(next.getDate()+parseInt(i.intervalRawat||30));
    return next <= today || Math.ceil((next-today)/(1000*60*60*24)) <= 7;
  }).length;
}

// ─ login ────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-err');
  btn.innerHTML = '<span class="spin"></span> Masuk…'; btn.disabled = true;
  err.style.display = 'none';
  try {
    const username = document.getElementById('l-user').value.trim();
    const pw       = document.getElementById('l-pw').value;
    S.user = await doLogin(username, pw);
    saveSession(S.user);
    go('dashboard');
  } catch(ex) {
    // Tampilkan pesan multiline dengan benar
    err.innerHTML = (ex.message || 'Login gagal').replace(/\n/g,'<br>');
    err.style.display = 'block';
    btn.innerHTML = 'Masuk ke ' + S.theme.appTitle;
    btn.disabled = false;
  }
}

async function handleSetup(e) {
  e.preventDefault();
  const err = document.getElementById('su-err');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Membuat akun…';
  try {
    await setupSuperAdmin(
      document.getElementById('su-nama').value,
      document.getElementById('su-email').value,
      document.getElementById('su-pw').value
    );
    toast('Super Admin dibuat! Silakan login.');
    S.page = 'login'; render();
  } catch(ex) {
    console.warn('Setup error:', ex.code, ex.message);
    // Semua kondisi "sudah ada" → redirect login
    const sudahAda = [
      'superadmin-exists',
      'auth/email-already-in-use',
      'auth/account-exists-with-different-credential',
    ];
    if (sudahAda.includes(ex.code)) {
      toast('Akun Super Admin sudah terdaftar. Silakan login.', 'inf');
      S.page = 'login'; render();
      return;
    }
    const m = {
      'auth/weak-password'   : 'Password minimal 6 karakter.',
      'auth/invalid-email'   : 'Format email tidak valid.',
      'auth/api-key-not-valid.-please-pass-a-valid-api-key.' : '❌ Firebase API Key salah. Periksa FB_CONFIG di index.html.',
      'firestore-rules-not-set' : ex.message, // sudah jelas dari setupSuperAdmin
    };
    err.innerHTML = m[ex.code]
      ? `<span>${m[ex.code]}</span>`
      : `<span>Error: ${ex.message || ex.code}</span>`;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Buat Akun Super Admin';
  }
}

async function submitItem(e) {

  let lokasi = f.lokasi.value;

  const data = {
    kode:              f.kode.value.trim(),
    nama:              f.nama.value.trim(),
    jenis:             f.jenis.value,
    jumlah:            parseInt(f.jumlah.value),
    tanggalDiperoleh:  f.tanggalDiperoleh.value,

    lokasi:            lokasi,
    status:            f.status.value,
    bisaDipinjam:      f.bisaDipinjam.value !== 'tidak',
    jadwalPerawatan:   f.jadwal.value,
    detailPerawatan:   f.detailPerawatan?.value?.trim() || '',
    intervalRawat:     f.intervalRawat?.value || '30',
    tglRawatTerakhir:  f.tglRawatTerakhir?.value || '',

// ═══════════════════════════════════════════════════════════════
//  DATA LOADERS
// ═══════════════════════════════════════════════════════════════
// Simpan unsubscribe functions untuk realtime listeners
let _unsubItems   = null;
let _unsubHistory = null;

async function loadPeminjaman() {
  // Ambil data terbaru dari Firestore setiap kali halaman dibuka
  try {
    _items = await dbItems();
    hitungNotif();
    // Re-render content area saja
    const ct = document.querySelector('.content');
    if (ct) ct.innerHTML = tplPeminjaman();
  } catch(e) { toast('Gagal memuat data: '+e.message, 'err'); }
}

function stopRealtimeListeners() {
  if (_unsubItems)   { _unsubItems();   _unsubItems   = null; }
  if (_unsubHistory) { _unsubHistory(); _unsubHistory = null; }
}

async function loadDashboard() {
  // Hentikan listener lama jika ada
  stopRealtimeListeners();

  // Realtime listener untuk items
  _unsubItems = db.collection('items').onSnapshot(snap => {
    _items = snap.docs.map(d=>({id:d.id,...d.data()}));
    hitungNotif();
    renderDashboardStats(_items);
    renderDashboardAttn(_items);
  }, e => {
    console.warn('items snapshot:', e.code);
    const st = document.getElementById('stats');
    if (st) st.innerHTML = `<div style="grid-column:1/-1;padding:14px;background:#FEF2F2;border-radius:10px;color:var(--danger);font-size:13px">⚠️ Akses ditolak. Periksa Firestore Rules.</div>`;
  });

  // Realtime listener untuk history
  _unsubHistory = db.collection('history').orderBy('timestamp','desc').limit(20).onSnapshot(snap => {
    const hist = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderDashboardHistory(hist);
  }, e => console.warn('history snapshot:', e.code));
}

function renderDashboardStats(items) {
  const st = document.getElementById('stats');
  if (!st) return;
  const total  = items.length;
  const rusak  = items.filter(i=>i.status==='rusak').length;
  const pinjam = items.filter(i=>(i.pinjamList||[]).length>0).length;
  const rawat  = items.filter(i=>i.jadwalPerawatan==='ada').length;
  st.innerHTML = [
    {ic:'📦', lbl:'Total Barang',     val:total,       col:'var(--primary)'},
    {ic:'✅', lbl:'Masih Digunakan',  val:total-rusak,  col:'var(--success)'},
    {ic:'🔴', lbl:'Kondisi Rusak',    val:rusak,        col:'var(--danger)'},
    {ic:'🔄', lbl:'Sedang Dipinjam',  val:pinjam,       col:'var(--warn)'},
    {ic:'🔧', lbl:'Ada Jadwal Rawat', val:rawat,        col:'var(--info)'},
  ].map(s=>`
    <div class="sc">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:26px;font-weight:700;color:${s.col}">${s.val}</div>
          <div style="font-size:12.5px;color:var(--muted);margin-top:3px">${s.lbl}</div>
        </div>
        <div style="font-size:28px">${s.ic}</div>
      </div>
    </div>`).join('');
}

function renderDashboardHistory(hist) {
  const rec = document.getElementById('recent');
  if (!rec) return;
  if (!hist.length) { rec.innerHTML='<p style="color:var(--muted);font-size:13px">Belum ada aktivitas</p>'; return; }
  const icons = {tambah:'➕',edit:'✏️',hapus:'🗑️',pinjam:'📤',kembali:'📥'};
  rec.innerHTML = hist.slice(0,8).map(h=>`
    <div style="display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:15px">${icons[h.action]||'📌'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.itemNama||'–'}</div>
        <div style="font-size:11px;color:var(--muted)">${(h.action||'').toUpperCase()} – ${h.userName} • ${fmt.dt(h.timestamp)}</div>
      </div>
    </div>`).join('');
}

function renderDashboardAttn(items) {
  const at = document.getElementById('attn');
  if (!at) return;
  const rusakItems  = items.filter(i=>i.status==='rusak');
  const pinjamItems = items.filter(i=>(i.pinjamList||[]).length>0);
  let html = '';
  if (rusakItems.length) html += `
    <div style="font-size:11.5px;font-weight:700;color:var(--danger);margin-bottom:5px">🔴 RUSAK (${rusakItems.length})</div>
    ${rusakItems.slice(0,4).map(i=>`<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">${i.nama} <span style="color:var(--muted);font-size:11px">${i.lokasi||''}</span></div>`).join('')}
    ${rusakItems.length>4?`<div style="font-size:11px;color:var(--muted);margin-top:3px">+${rusakItems.length-4} lainnya</div>`:''}
    <div style="height:10px"></div>`;
  if (pinjamItems.length) html += `
    <div style="font-size:11.5px;font-weight:700;color:var(--warn);margin-bottom:5px">🟡 DIPINJAM (${pinjamItems.length})</div>
    ${pinjamItems.slice(0,4).map(i=>{
      const pl = i.pinjamList||[];
      return `<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">${i.nama} → <span style="color:var(--muted)">${pl.map(p=>p.nama).join(', ')}</span></div>`;
    }).join('')}`;
  at.innerHTML = html || '<p style="color:var(--muted);font-size:13px">Tidak ada item yang perlu perhatian 🎉</p>';
}

// ── ITEMS TABLE ───────────────────────────────────────────────
let _items = [];

async function loadItems() {
  try { _items = await dbItems(); renderItemsTable(_items); }
  catch(e) { document.getElementById('items-tbl').innerHTML=`<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

function renderItemsTable(items) {
  const el = document.getElementById('items-tbl');
  if (!el) return;
  if (!items.length) { el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">Tidak ada barang. Tambahkan barang baru!</p>'; return; }
  el.innerHTML = `
    <div style="margin-bottom:8px;font-size:13px;color:var(--muted)">Menampilkan <strong>${items.length}</strong> barang</div>
    <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr>
        <th>Kode</th><th>Nama Barang</th><th>Jenis</th>
        <th>Total</th><th>Dipinjam</th><th>Tersedia</th>
        <th>Lokasi</th><th>Status</th><th>Pinjam</th><th>Rawat</th><th>Aksi</th>
      </tr></thead>
      <tbody>
      ${items.map(it=>{
        const pinjamList   = it.pinjamList||[];
        const totalPinjam  = pinjamList.reduce((s,p)=>s+p.jumlah,0);
        const stok         = Math.max(0,it.jumlah-totalPinjam);
        const bisDipinjam  = it.bisaDipinjam!==false;
        return `<tr>
          <td style="font-family:monospace;font-size:11px">${it.kode||'–'}</td>
          <td style="font-weight:500;min-width:120px">${it.nama}</td>
          <td style="font-size:12px">${it.jenis||'–'}</td>
          <td style="text-align:center">${it.jumlah||0}</td>
          <td style="text-align:center"><span style="color:var(--warn);font-weight:600">${totalPinjam||0}</span></td>
          <td style="text-align:center"><span style="color:${stok>0?'var(--success)':'var(--danger)'};font-weight:700">${stok}</span></td>
          <td style="font-size:12px;color:var(--muted)">${it.lokasi||'–'}</td>
          <td><span class="bdg ${it.status==='rusak'?'bdg-r':'bdg-g'}" style="font-size:10px">${it.status==='rusak'?'Rusak':'Aktif'}</span></td>
          <td>
            ${!bisDipinjam?'<span class="bdg bdg-n" style="font-size:10px">Tidak Bisa</span>'
              :pinjamList.length
                ?`<span class="bdg bdg-y" style="font-size:10px" title="${pinjamList.map(p=>p.nama+' ('+p.jumlah+')').join(', ')}">📤 ${pinjamList.length} org</span>`
                :'<span class="bdg bdg-g" style="font-size:10px">Tersedia</span>'}
          </td>
          <td><span class="bdg ${it.jadwalPerawatan==='ada'?'bdg-b':'bdg-n'}" style="font-size:10px">${it.jadwalPerawatan==='ada'?'Rawat':'–'}</span></td>
          <td>
            <div style="display:flex;gap:4px">
              <button class="act-btn act-edit" onclick="editItem('${it.id}')">Edit</button>
              ${['superadmin','admin'].includes(S.user?.role) ? `<button class="act-btn act-del" onclick="delItem('${it.id}','${it.nama.replace(/'/g,"\\'")}')">Hapus</button>` : ''}
              <button class="abt" style="background:#F0FDF4;color:#166534;border-color:#BBF7D0" onclick="cetakLabel('${it.id}')">🏷️</button>
            </div>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
}

function filterItems() {
  const q  = document.getElementById('f-q')?.value.toLowerCase()||'';
  const jn = document.getElementById('f-jenis')?.value||'';
  const st = document.getElementById('f-status')?.value||'';
  const pn = document.getElementById('f-pinjam')?.value||'';
  renderItemsTable(_items.filter(it=>{
    if (q  && !it.nama?.toLowerCase().includes(q) && !it.kode?.toLowerCase().includes(q)) return false;
    if (jn && it.jenis!==jn) return false;
    if (st && it.status!==st) return false;
    const _sdg = (it.pinjamList||[]).length > 0;
    if (pn==='dipinjam' && !_sdg) return false;
    if (pn==='tersedia' &&  _sdg) return false;
    return true;
  }));
}

function resetFilter() {
  ['f-q','f-jenis','f-status','f-pinjam'].forEach(id=>{ const e=document.getElementById(id); if(e)e.value=''; });
  renderItemsTable(_items);
}

async function editItem(id) {
  const it = _items.find(i=>i.id===id) || await dbItem(id);
  go('form-barang', {item:it});
}

function delItem(id, nama) {
  // Validasi role
  const role = S.user?.role;
  if (!['superadmin','admin'].includes(role)) {
    toast('Anda tidak memiliki izin untuk menghapus barang', 'err');
    return;
  }

  // Cek apakah sedang dipinjam
  const it = _items.find(i=>i.id===id);
  if (it) {
    const totalPinjam = (it.pinjamList||[]).reduce((s,p)=>s+p.jumlah,0);
    if (totalPinjam > 0) {
      const peminjam = (it.pinjamList||[]).map(p=>p.nama).join(', ');
      toast(`Tidak bisa dihapus — "${nama}" sedang dipinjam oleh: ${peminjam}`, 'err');
      return;
    }
  }

  if (!confirm(`Hapus barang "${nama}"?\n\nTindakan ini akan dicatat ke riwayat.`)) return;
  dbDeleteItem(id, it)
    .then(()=>{ toast('Barang dihapus'); loadItems(); })
    .catch(e=>toast('Gagal: '+e.message,'err'));
}

// ── SEARCH ───────────────────────────────────────────────────
async function doSearch() {
  const q    = document.getElementById('sc-q')?.value.toLowerCase()||'';
  const jn   = document.getElementById('sc-jenis')?.value||'';
  const lok  = document.getElementById('sc-lok')?.value.toLowerCase()||'';
  const dari = document.getElementById('sc-dari')?.value.toLowerCase()||'';
  const t1   = document.getElementById('sc-t1')?.value||'';
  const t2   = document.getElementById('sc-t2')?.value||'';
  const st   = document.getElementById('sc-status')?.value||'';
  const rw   = document.getElementById('sc-rawat')?.value||'';
  const pn   = document.getElementById('sc-pinjam')?.value||'';

  const el = document.getElementById('sc-result');
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:40px;gap:10px"><div class="spin spin-dk"></div><span style="color:var(--muted)">Mencari…</span></div>';

  try {
    const all = await dbItems();
    const res = all.filter(it=>{
      if (q    && !it.nama?.toLowerCase().includes(q) && !it.kode?.toLowerCase().includes(q)) return false;
      if (jn   && it.jenis!==jn) return false;
      if (lok  && !it.lokasi?.toLowerCase().includes(lok)) return false;
      if (dari && !it.diperolehDari?.toLowerCase().includes(dari)) return false;
      if (st   && it.status!==st) return false;
      if (rw   && it.jadwalPerawatan!==rw) return false;
      if (t1   && it.tanggalDiperoleh && it.tanggalDiperoleh < t1) return false;
      if (t2   && it.tanggalDiperoleh && it.tanggalDiperoleh > t2) return false;
      // Filter peminjaman: hitung stok tersedia secara logis
      const _totalPinjam  = (it.pinjamList||[]).reduce(function(s,p){return s+p.jumlah;},0);
      const _stokTersedia = Math.max(0,(it.jumlah||0) - _totalPinjam);
      const bolehDipinjam = it.bisaDipinjam !== false;
      // dipinjam = bisa dipinjam DAN ada yang pinjam (stok berkurang)
      if (pn === 'dipinjam'   && (!bolehDipinjam || _totalPinjam === 0)) return false;
      // tersedia = bisa dipinjam DAN stok tersedia > 0 (total - dipinjam != 0)
      if (pn === 'tersedia'   && (!bolehDipinjam || _stokTersedia === 0)) return false;
      // tidak_bisa = barang yang dikunci tidak bisa dipinjam
      if (pn === 'tidak_bisa' && bolehDipinjam) return false;
      return true;
    });

    if (!res.length) {
      el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Tidak ada barang yang cocok dengan kriteria pencarian</p>';
      return;
    }

    el.innerHTML = `
      <div style="margin-bottom:10px;font-size:13px;color:var(--muted)">Ditemukan <strong>${res.length}</strong> barang</div>
      <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th>Kode</th><th>Nama</th><th>Jenis</th>
          <th>Total</th><th>Dipinjam</th><th>Tersedia</th>
          <th>Lokasi</th><th>Tgl Diperoleh</th><th>Status</th><th>Perawatan</th><th>Peminjaman</th>
        </tr></thead>
        <tbody>
        ${res.map(it=>{
          const pl          = it.pinjamList || [];
          const totalPinjam = pl.reduce((s,p)=>s+p.jumlah, 0);
          const stok        = Math.max(0, it.jumlah - totalPinjam);
          const sedang      = pl.length > 0;
          const bisDipinjam = it.bisaDipinjam !== false;
          return `<tr>
            <td style="font-family:monospace;font-size:11px">${it.kode||'–'}</td>
            <td style="font-weight:500">${it.nama}</td>
            <td style="font-size:12px">${it.jenis||'–'}</td>
            <td style="text-align:center">${it.jumlah||0}</td>
            <td style="text-align:center;color:var(--warn);font-weight:600">${totalPinjam}</td>
            <td style="text-align:center;font-weight:700;color:${stok>0?'var(--success)':'var(--danger)'}">${stok}</td>
            <td style="font-size:12px">${it.lokasi||'–'}</td>
            <td style="font-size:12px">${it.tanggalDiperoleh||'–'}</td>
            <td><span class="bdg ${it.status==='rusak'?'bdg-r':'bdg-g'}" style="font-size:10px">${it.status==='rusak'?'Rusak':'Aktif'}</span></td>
            <td><span class="bdg ${it.jadwalPerawatan==='ada'?'bdg-b':'bdg-n'}" style="font-size:10px">${it.jadwalPerawatan==='ada'?'Ada':'–'}</span></td>
            <td style="min-width:120px">
              ${!bisDipinjam
                ? '<span class="bdg bdg-n" style="font-size:10px">Tidak Bisa Dipinjam</span>'
                : sedang
                  ? `<span class="bdg bdg-y" style="font-size:10px" title="${pl.map(p=>p.nama+' ('+p.jumlah+' unit)').join(', ')}">📤 ${pl.length} peminjam</span>`
                  : '<span class="bdg bdg-g" style="font-size:10px">Tersedia</span>'
              }
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      </div>`;
  } catch(e) { el.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

function resetSearch() {
  ['sc-q','sc-jenis','sc-lok','sc-dari','sc-t1','sc-t2','sc-status','sc-rawat','sc-pinjam'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('sc-result').innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">Masukkan kriteria di atas lalu klik <strong>Cari Sekarang</strong></p>';
}

// ── HISTORY ───────────────────────────────────────────────────
let _histCache    = [];
let _histFiltered = [];

async function loadHistory() {
  const el = document.getElementById('hist-tbl');
  if (!el) return;
  el.innerHTML = '<p style="text-align:center;padding:20px;color:var(--muted)">Memuat...</p>';
  try {
    _histCache = await dbHistory();
    applyHistoryFilter();
  } catch(e) { el.innerHTML = '<p style="color:var(--danger)">Error: ' + e.message + '</p>'; }
}

function applyHistoryFilter() {
  const el  = document.getElementById('hist-tbl');
  const inf = document.getElementById('rv-info');
  if (!el) return;
  const fa = document.getElementById('rv-act')?.value  || '';
  const fr = document.getElementById('rv-role')?.value || '';
  const t1 = document.getElementById('rv-t1')?.value   || '';
  const t2 = document.getElementById('rv-t2')?.value   || '';
  let h = _histCache.slice();
  if (fa) h = h.filter(function(x){ return x.action===fa; });
  if (fr) h = h.filter(function(x){ return x.userRole===fr; });
  if (t1||t2) h = h.filter(function(x){
    if (!x.timestamp) return false;
    const d   = x.timestamp && x.timestamp.toDate ? x.timestamp.toDate() : new Date(x.timestamp);
    const tgl = d.toISOString().slice(0,10);
    if (t1 && tgl < t1) return false;
    if (t2 && tgl > t2) return false;
    return true;
  });
  _histFiltered = h;
  if (inf) {
    const parts = [];
    if (fa) parts.push('Aksi: ' + fa.toUpperCase());
    if (fr) parts.push('Role: ' + roleLabel(fr));
    if (t1) parts.push('Dari: ' + new Date(t1).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}));
    if (t2) parts.push('S/D: '  + new Date(t2).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}));
    if (parts.length) {
      inf.style.display = 'block';
      inf.innerHTML = 'Filter aktif: <strong>' + parts.join(' &middot; ') + '</strong> &mdash; ' + h.length + ' entri ditemukan';
    } else {
      inf.style.display = 'none';
    }
  }
  if (!h.length) {
    el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Tidak ada riwayat dengan filter ini</p>';
    return;
  }
  const ac = {tambah:'bdg-g', edit:'bdg-b', hapus:'bdg-r', pinjam:'bdg-y', kembali:'bdg-b'};
  let rows = '';
  h.forEach(function(x){
    rows += '<tr>'
      + '<td style="font-size:12px;white-space:nowrap">' + fmt.dt(x.timestamp) + '</td>'
      + '<td><span class="bdg ' + (ac[x.action]||'bdg-n') + '">' + (x.action||'').toUpperCase() + '</span></td>'
      + '<td style="font-weight:500">' + (x.itemNama||'&ndash;') + '</td>'
      + '<td style="font-family:monospace;font-size:11.5px">' + (x.itemKode||'&ndash;') + '</td>'
      + '<td>' + (x.userName||'&ndash;') + '</td>'
      + '<td><span class="bdg bdg-p" style="font-size:10.5px">' + roleLabel(x.userRole) + '</span></td>'
      + '</tr>';
  });
  el.innerHTML = '<div style="margin-bottom:8px;font-size:13px;color:var(--muted)">Menampilkan <strong>' + h.length + '</strong> dari <strong>' + _histCache.length + '</strong> entri</div>'
    + '<table class="tbl"><thead><tr><th>Waktu</th><th>Aksi</th><th>Nama Barang</th><th>Kode</th><th>Oleh</th><th>Role</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>';
}

function resetFilterRiwayat() {
  ['rv-act','rv-role','rv-t1','rv-t2'].forEach(function(id){
    const el = document.getElementById(id); if (el) el.value = '';
  });
  applyHistoryFilter();
}

function exportCSVFiltered() {
  const h = _histFiltered.length ? _histFiltered : _histCache;
  if (!h.length) { toast('Belum ada data untuk diekspor', 'inf'); return; }
  const t1 = document.getElementById('rv-t1')?.value || '';
  const t2 = document.getElementById('rv-t2')?.value || '';
  const suffix = (t1 && t2) ? (t1+'_sd_'+t2) : (t1 || t2 || new Date().toISOString().slice(0,10));
  const rows = [['Waktu','Aksi','Nama Barang','Kode Barang','Dilakukan Oleh','Role']].concat(
    h.map(function(x){
      return [fmt.dt(x.timestamp),(x.action||'').toUpperCase(),x.itemNama||'',x.itemKode||'',x.userName||'',roleLabel(x.userRole)];
    })
  );
  const csv = rows.map(function(r){
    return r.map(function(c){ return '"'+String(c||'').replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');
  const bom = String.fromCharCode(0xFEFF);
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'riwayat-simba-'+suffix+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Export CSV berhasil! (' + h.length + ' entri)');
}
function exportCSV() { exportCSVFiltered(); }


// ── LAPORAN ───────────────────────────────────────────────────
function switchTab(i) {
  S.lapTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,idx)=>{
    b.classList.toggle('active', idx===i);
  });
  loadLaporan(i);
}

function grpBy(arr, key) {
  return arr.reduce((a,v)=>{ const k=v[key]||'Tidak Diketahui'; (a[k]=a[k]||[]).push(v); return a; }, {});
}

async function loadLaporan(tab) {
  const el = document.getElementById('lap-body');
  if (!el) return;
  el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Memuat laporan…</p>';
  try {
    const items = await dbItems();
    let html = '';

    if (tab===0) {
      html = renderLapGroup(grpBy(items,'jenis'),'Laporan per Jenis Barang');
    } else if (tab===1) {
      html = renderLapGroup(grpBy(items,'lokasi'),'Laporan per Lokasi Penempatan');
    } else if (tab===2) {
      html = renderLapGroup({
        'Masih Digunakan': items.filter(i=>i.status!=='rusak'),
        'Rusak':           items.filter(i=>i.status==='rusak'),
      },'Laporan per Status / Kondisi');
    } else if (tab===3) {
      html = renderLapGroup({
        'Sedang Dipinjam': items.filter(i=>(i.pinjamList||[]).length>0),
        'Tersedia':        items.filter(i=>!(i.pinjamList||[]).length),
      },'Laporan Peminjaman');
    } else if (tab===4) {
      // Tab Perawatan
      const today = new Date();
      const rawat = items.filter(i=>i.jadwalPerawatan==='ada');
      if (!rawat.length) { html = '<div class="card" style="text-align:center;padding:40px"><p style="color:var(--muted)">Tidak ada barang dengan jadwal perawatan</p></div>'; }
      else {
        const rows = rawat.map(i=>{
          if (!i.tglRawatTerakhir) return {item:i,status:'unknown',hari:null,tglNext:null};
          const last=new Date(i.tglRawatTerakhir),next=new Date(last);
          next.setDate(next.getDate()+parseInt(i.intervalRawat||30));
          const hari=Math.ceil((next-today)/(1000*60*60*24));
          return {item:i,status:hari<0?'overdue':hari<=7?'soon':'ok',hari,tglNext:next};
        }).sort((a,b)=>(a.hari??999)-(b.hari??999));
        html = `<div class="card" style="overflow-x:auto">
          <div style="font-size:13.5px;font-weight:700;color:var(--primary);margin-bottom:12px">🔧 Laporan Jadwal Perawatan</div>
          <table class="tbl"><thead><tr><th>Nama Barang</th><th>Jenis</th><th>Lokasi</th><th>Interval</th><th>Tgl Terakhir</th><th>Jadwal Berikutnya</th><th>Status</th></tr></thead>
          <tbody>${rows.map(r=>{
            const sc=r.status==='overdue'?'bdg-r':r.status==='soon'?'bdg-y':'bdg-g';
            const sl=r.status==='overdue'?'Terlambat '+Math.abs(r.hari)+' hr':r.status==='soon'?r.hari+' hr lagi':r.status==='ok'?r.hari+' hr lagi':'Belum dicatat';
            return '<tr><td style="font-weight:500">'+r.item.nama+'</td><td style="font-size:12px">'+( r.item.jenis||'–')+'</td><td style="font-size:12px">'+(r.item.lokasi||'–')+'</td><td style="font-size:12px">'+(r.item.intervalRawat||30)+' hari</td><td style="font-size:12px">'+(r.item.tglRawatTerakhir||'–')+'</td><td style="font-size:12px">'+(r.tglNext?r.tglNext.toLocaleDateString('id-ID'):'–')+'</td><td><span class="bdg '+sc+'" style="font-size:10.5px">'+sl+'</span></td></tr>';
          }).join('')}</tbody></table></div>`;
      }
    } else if (tab===5) {
      const hist = await dbHistory();
      const bu = grpBy(hist,'userName');
      html = Object.entries(bu).map(([name,acts])=>`
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div><div style="font-weight:600">${name}</div><div style="font-size:12px;color:var(--muted)">${roleLabel(acts[0]?.userRole)}</div></div>
            <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:var(--primary)">${acts.length}</div><div style="font-size:11px;color:var(--muted)">aktivitas</div></div>
          </div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            <span class="bdg bdg-g">Tambah: ${acts.filter(a=>a.action==='tambah').length}</span>
            <span class="bdg bdg-b">Edit: ${acts.filter(a=>a.action==='edit').length}</span>
            <span class="bdg bdg-r">Hapus: ${acts.filter(a=>a.action==='hapus').length}</span>
          </div>
        </div>`).join('');
    }
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

function renderLapGroup(groups, title) {
  return Object.entries(groups).map(([g,its])=>`

// ── USERS ─────────────────────────────────────────────────────
async function loadUsers() {
  const el = document.getElementById('usr-tbl');
  if (!el) return;
  try {
    const users = await dbUsers();
    if (!users.length) { el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">Tidak ada pengguna</p>'; return; }
    let rows = '';
    users.forEach(function(u) {
      const isMe     = u.uid===S.user?.uid || u.id===S.user?.id;
      const locked   = u.locked === true;
      const attempts = u.failedAttempts || 0;
      const lastLogin= u.lastLogin ? fmt.dt(u.lastLogin) : '–';
      const nama_esc = (u.nama||'').replace(/'/g,"\'");
      rows += '<tr>'
        + '<td style="font-weight:500">' + u.nama + (isMe?' <span class="bdg bdg-b" style="font-size:10px">Anda</span>':'') + '</td>'
        + '<td style="font-size:12.5px;color:var(--muted);font-family:monospace">' + (u.username||'–') + '</td>'
        + '<td><span class="bdg bdg-p">' + roleLabel(u.role) + '</span></td>'
        + '<td>'
          + (u.active===false
              ? '<span class="bdg bdg-r">Nonaktif</span>'
              : locked
                ? '<span class="bdg bdg-r">🔒 Terkunci</span>'
                : '<span class="bdg bdg-g">Aktif</span>')
        + '</td>'
        + '<td style="font-size:11px">'
          + (locked
              ? '<span style="color:var(--danger)">Terkunci</span>'
              : attempts > 0
                ? '<span style="color:var(--warn)">Gagal: '+attempts+'x</span>'
                : '<span style="color:var(--muted)">Login: '+lastLogin+'</span>')
        + '</td>'
        + '<td style="font-size:11.5px">' + fmt.date(u.createdAt) + '</td>'
        + '<td>'
          + (!isMe
            ? '<div style="display:flex;gap:4px;flex-wrap:wrap">'
              + '<button class="act-btn act-edit" onclick="editUser(' + JSON.stringify(u.id||u.uid) + ')">Edit</button>'
              + (locked ? '<button class="abt" style="background:#FEF9C3;color:#92400E;border-color:#FDE68A;font-size:11px" onclick="unlockUser(' + JSON.stringify(u.id||u.uid) + ',' + JSON.stringify(u.nama) + ')">🔓 Buka</button>' : '')
              + '<button class="act-btn act-del" onclick="delUser(' + JSON.stringify(u.id||u.uid) + ',' + JSON.stringify(u.nama) + ')">Hapus</button>'
              + '</div>'
            : '–')
        + '</td>'
        + '</tr>';
    });
    el.innerHTML = '<table class="tbl"><thead><tr>'
      + '<th>Nama</th><th>Username</th><th>Role</th><th>Status</th><th>Keamanan</th><th>Dibuat</th><th>Aksi</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table>';
  } catch(e) { el.innerHTML = '<p style="color:var(--danger)">Error: '+e.message+'</p>'; }
}


async function editUser(id) {
  const d = await db.collection('users').doc(id).get();
  if (d.exists) go('form-pengguna', {udata:{id:d.id, uid:d.id, ...d.data()}});
}

function delUser(id, nama) {
  if (!confirm('Hapus pengguna "'+nama+'"?')) return;
  dbDeleteUser(id).then(function(){ toast('Pengguna dihapus'); loadUsers(); }).catch(function(e){ toast(e.message,'err'); });
}

function unlockUser(id, nama) {
  if (!confirm('Buka kunci akun "'+nama+'"?\nSemua hitungan percobaan gagal akan direset.')) return;
  dbUnlockUser(id)
    .then(function(){ toast('✓ Akun "'+nama+'" berhasil dibuka!'); loadUsers(); })
    .catch(function(e){ toast('Gagal: '+e.message,'err'); });
}

// ── Color helpers ────────────────────────────────────────────
function setColor(type, hex) {
  if (type === 'primary') {
    const el = document.getElementById('th-primary');
    const hx = document.getElementById('th-primary-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  } else if (type === 'accent') {
    const el = document.getElementById('th-accent');
    const hx = document.getElementById('th-accent-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  } else if (type === 'bg') {
    const el = document.getElementById('th-bg');
    const hx = document.getElementById('th-bg-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  }
  previewColor();
}

function previewColor() {
  const p  = document.getElementById('th-primary')?.value || S.theme.colorPrimary;
  const a  = document.getElementById('th-accent')?.value  || S.theme.colorAccent;
  const bg = document.getElementById('th-bg')?.value      || S.theme.colorBg;
  const ttl = document.getElementById('th-title')?.value  || S.theme.appTitle;
  const sub = document.getElementById('th-sub')?.value    || S.theme.appSubtitle;

  // Sync hex inputs
  const phx=document.getElementById('th-primary-hex'); if(phx&&document.activeElement!==phx) phx.value=p;
  const ahx=document.getElementById('th-accent-hex');  if(ahx&&document.activeElement!==ahx) ahx.value=a;
  const bhx=document.getElementById('th-bg-hex');      if(bhx&&document.activeElement!==bhx) bhx.value=bg;

  // Update CSS live
  document.documentElement.style.setProperty('--primary', p);
  document.documentElement.style.setProperty('--primary-l', lighten(p,30));
  document.documentElement.style.setProperty('--primary-ll', lighten(p,60));
  document.documentElement.style.setProperty('--accent', a);
  document.documentElement.style.setProperty('--accent-l', lighten(a,28));
  document.documentElement.style.setProperty('--bg', bg);

  // Update preview panel
  const prev = document.getElementById('theme-preview');
  if (prev) {
    const tempTheme = { ...S.theme, colorPrimary:p, colorAccent:a, colorBg:bg, appTitle:ttl, appSubtitle:sub };
    const orig = S.theme;
    S.theme = tempTheme;
    prev.innerHTML = tplThemePreview();
    S.theme = orig;
  }
}

function uploadLogoImage(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  if (file.size > 600 * 1024) { toast('Ukuran gambar max 600KB', 'err'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    S.theme.logoType   = 'image';
    S.theme.logoBase64 = e.target.result;
    // Update preview langsung tanpa re-render halaman
    const prev = document.getElementById('logo-preview');
    if (prev) {
      prev.innerHTML = logoHtml('60px');
      prev.style.padding = '0';
    }
    // Re-render halaman untuk update tampilan emoji selector
    go('pengaturan');
    toast('Logo diupload! Klik Simpan Tema untuk menyimpan.');
  };
  reader.readAsDataURL(file);
}

async function saveTema() {
  const newTheme = {
    appTitle    : document.getElementById('th-title')?.value.trim()   || S.theme.appTitle,
    appSubtitle : document.getElementById('th-sub')?.value.trim()     || S.theme.appSubtitle,
    colorPrimary: document.getElementById('th-primary')?.value        || S.theme.colorPrimary,
    colorAccent : document.getElementById('th-accent')?.value         || S.theme.colorAccent,
    colorBg     : document.getElementById('th-bg')?.value             || S.theme.colorBg,
    logoType    : S.theme.logoType,
    logoEmoji   : S.theme.logoEmoji,
    logoBase64  : S.theme.logoBase64,
    fontSize    : S.theme.fontSize || 'normal',
  };
  try {
    await dbSaveSettings(newTheme);
    toast('✓ Tema berhasil disimpan!');
    render();
  } catch(e) {
    console.error('saveTema error:', e.code, e.message);
    if (e.code === 'permission-denied') {
      toast('❌ Permission denied. Tambahkan rules /settings ke Firestore (lihat Pengaturan → Rules)', 'err');
      // Terapkan ke lokal saja meski Firestore gagal
      Object.assign(S.theme, newTheme);
      applyTheme();
      toast('⚠️ Tema diterapkan lokal sementara — perbarui Firestore Rules agar bisa disimpan', 'inf');
      render();
    } else {
      toast('Gagal simpan: ' + e.message, 'err');
    }
  }
}

// Dimensi label: 10cm lebar x 3cm tinggi (landscape)
// Pada 96dpi: 378px x 113px — pakai 3x scale → 1134px x 339px
const LABEL_W_CM = 10, LABEL_H_CM = 3;
const DPI = 300;
const PX_PER_CM = DPI / 2.54;
const LABEL_W = Math.round(LABEL_W_CM * PX_PER_CM); // ~1181px
const LABEL_H = Math.round(LABEL_H_CM * PX_PER_CM); // ~354px

async function cetakLabel(itemId) {
  const item = _items.find(i=>i.id===itemId) || await dbItem(itemId);
  if (!item) { toast('Barang tidak ditemukan','err'); return; }

  // Buat overlay
  const ov = document.createElement('div');
  ov.className = 'label-overlay';
  ov.id = 'label-ov';
  ov.innerHTML = `
    <div class="label-box">
      <h3>🏷️ Label Barang — ${item.nama}</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
        Ukuran cetak: <strong>10cm &times; 3cm</strong> (landscape) &nbsp;·&nbsp; 300 DPI
      </p>
      <canvas id="label-canvas"></canvas>
      <div id="label-multi" style="margin-bottom:12px">
        <label style="font-size:12.5px;font-weight:600;display:block;margin-bottom:5px">Jumlah label:</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="label-qty" value="1" min="1" max="50"
            class="inp" style="width:80px" onchange="updateLabelPreview('${itemId}')">
          <span style="font-size:12px;color:var(--muted)">lembar (maks 50)</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-accent" onclick="downloadLabel()">⬇ Download JPEG</button>
        <button class="btn btn-primary" onclick="printLabel()">🖨️ Cetak</button>
        <button class="btn btn-ghost" onclick="document.getElementById('label-ov').remove()">✕ Tutup</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  // Simpan item di window untuk akses dari fungsi lain
  window._labelItem = item;

  // Render canvas
  await renderLabelCanvas(item);
}

async function renderLabelCanvas(item) {
  const canvas = document.getElementById('label-canvas');
  if (!canvas) return;

  canvas.width  = LABEL_W;
  canvas.height = LABEL_H;
  // Preview di layar ~60% ukuran asli
  canvas.style.width  = Math.round(LABEL_W * 0.55) + 'px';
  canvas.style.height = Math.round(LABEL_H * 0.55) + 'px';

  const ctx = canvas.getContext('2d');

  // Background putih
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, LABEL_W, LABEL_H);

  // Border tipis
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth   = 3;
  ctx.strokeRect(6, 6, LABEL_W-12, LABEL_H-12);

  // ── Barcode ──────────────────────────────────────────────────
  // Buat SVG barcode sementara
  const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
  const kode  = item.kode || 'NOCODE';
  try {
    JsBarcode(svgEl, kode, {
      format       : 'CODE128',
      width        : 3,
      height       : Math.round(LABEL_H * 0.42),
      displayValue : false,
      margin       : 0,
    });
  } catch(e) {
    JsBarcode(svgEl, 'SIMBA', { format:'CODE128', width:3, height:Math.round(LABEL_H*0.42), displayValue:false, margin:0 });
  }

  // Konversi SVG → gambar di canvas
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const svgBlob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  const svgUrl  = URL.createObjectURL(svgBlob);

  await new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      // Barcode di kiri
      const bcW    = Math.round(LABEL_W * 0.40);
      const bcH    = Math.round(LABEL_H * 0.55);
      const bcX    = 28;
      const bcY    = Math.round((LABEL_H - bcH) / 2);
      ctx.drawImage(img, bcX, bcY, bcW, bcH);
      URL.revokeObjectURL(svgUrl);
      res();
    };
    img.src = svgUrl;
  });

  // ── Kode barang (teks bawah barcode) ────────────────────────
  const bcX    = 28;
  const bcW    = Math.round(LABEL_W * 0.40);
  const codeY  = Math.round(LABEL_H * 0.84);
  ctx.fillStyle   = '#000000';
  ctx.font        = 'bold ' + Math.round(LABEL_H * 0.105) + 'px monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(kode, bcX + bcW/2, codeY);

  // ── Divider vertikal ─────────────────────────────────────────
  const divX = Math.round(LABEL_W * 0.44);
  ctx.strokeStyle = '#dddddd';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(divX, 20);
  ctx.lineTo(divX, LABEL_H - 20);
  ctx.stroke();

  // ── Info teks kanan ──────────────────────────────────────────
  const textX  = divX + 28;
  const maxW   = LABEL_W - textX - 20;
  const lineH  = Math.round(LABEL_H * 0.215);
  ctx.textAlign = 'left';

  // Nama barang — bold, besar
  ctx.fillStyle = '#111111';
  ctx.font      = 'bold ' + Math.round(LABEL_H * 0.152) + 'px DM Sans, sans-serif';
  const nama    = item.nama || 'Nama Barang';
  const namaLines = wrapText(ctx, nama, maxW);
  namaLines.slice(0,2).forEach((line, i) => {
    ctx.fillText(line, textX, 68 + i * Math.round(lineH*1.05));
  });

  // Lokasi
  const lokasiY = 68 + Math.min(namaLines.length,2) * Math.round(lineH*1.05) + 16;
  ctx.fillStyle = '#555555';
  ctx.font      = Math.round(LABEL_H * 0.118) + 'px DM Sans, sans-serif';
  ctx.fillText('📍 ' + (item.lokasi || '—'), textX, lokasiY);

  // Tanggal tercatat
  // Gunakan tanggal diperoleh (bukan tanggal input)
  const tglStr = item.tanggalDiperoleh
    ? new Date(item.tanggalDiperoleh).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})
    : '—';
  ctx.fillStyle = '#888888';
  ctx.font      = Math.round(LABEL_H * 0.10) + 'px DM Sans, sans-serif';
  ctx.fillText('📅 ' + tglStr, textX, lokasiY + Math.round(lineH * 1.05));

  // Jenis barang (kecil di pojok kanan bawah)
  ctx.fillStyle = '#aaaaaa';
  ctx.font      = Math.round(LABEL_H * 0.092) + 'px DM Sans, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText((item.jenis || ''), LABEL_W - 20, LABEL_H - 22);
}

// Helper: wrap teks agar tidak melebihi maxWidth
function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = w;
    } else { cur = test; }
  });
  if (cur) lines.push(cur);
  return lines;
}

async function updateLabelPreview(itemId) {
  const item = window._labelItem;
  if (item) await renderLabelCanvas(item);
}

function downloadLabel() {
  const canvas = document.getElementById('label-canvas');
  if (!canvas) return;
  const qty    = parseInt(document.getElementById('label-qty')?.value || 1);
  const item   = window._labelItem;
  if (!item) return;

  if (qty === 1) {
    // Download langsung
    const link = document.createElement('a');
    link.download = 'label-' + (item.kode || item.nama).replace(/\s+/g,'-') + '.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    toast('Label berhasil diunduh!');
    return;
  }

  // Multi-label: gabungkan secara vertikal dalam 1 file JPEG
  const totalH = LABEL_H * qty + 10 * (qty - 1);
  const combined = document.createElement('canvas');
  combined.width  = LABEL_W;
  combined.height = totalH;
  const ctx2 = combined.getContext('2d');
  ctx2.fillStyle = '#ffffff';
  ctx2.fillRect(0,0,LABEL_W,totalH);
  for (let i=0; i<qty; i++) {
    ctx2.drawImage(canvas, 0, i*(LABEL_H+10));
  }
  const link = document.createElement('a');
  link.download = 'label-' + (item.kode||item.nama).replace(/\s+/g,'-') + '-x'+qty+'.jpg';
  link.href = combined.toDataURL('image/jpeg', 0.95);
  link.click();
  toast('Download ' + qty + ' label berhasil!');
}

function printLabel() {
  const canvas = document.getElementById('label-canvas');
  const item   = window._labelItem;
  const qty    = parseInt(document.getElementById('label-qty')?.value || 1);
  if (!canvas || !item) return;

  const imgSrc = canvas.toDataURL('image/jpeg', 0.95);
  const labels = Array(qty).fill(`<img src="${imgSrc}" style="width:10cm;height:3cm;display:block;margin-bottom:2mm;page-break-inside:avoid">`).join('');

  const w = window.open('','_blank','width=600,height=500');
  w.document.write(`<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Label Barang — ${item.nama}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; font-family:sans-serif; }
  .page { padding: 5mm; }
  img { border:1px solid #eee; display:block; }
  @page { size: auto; margin: 5mm; }
  @media print {
    body { margin:0; }
    .no-print { display:none; }
  }

// ═══════════════════════════════════════════════════════════════
//  INIT APP – session-based (tanpa Firebase Auth)
// ═══════════════════════════════════════════════════════════════
async function initApp() {
  // 0. Dapatkan tiket akses Firebase Auth (anonymous) agar Firestore tidak ditolak
  await ensureFirebaseAuth();

  try { await dbLoadSettings(); } catch(e) { /* tema default */ }
  await initDefaultAdmin();

  // Muat master jenis & lokasi
  try {
    S._masterJenis  = await dbGetJenis();
    S._masterLokasi = await dbGetLokasi();
    JENIS_LIST  = S._masterJenis;
    LOKASI_LIST = S._masterLokasi;
  } catch(e) { console.warn('master data:', e.message); }

  const sess = loadSession();
  if (sess && (sess.id || sess.uid)) {
    try {
      const uid = sess.id || sess.uid;
      const doc  = await db.collection('users').doc(uid).get();
      if (doc.exists && doc.data().active !== false) {
        S.user = { id: doc.id, uid: doc.id, ...doc.data() };
        saveSession(S.user);
        go('dashboard');
        return;
      }
    } catch(e) { console.warn('Session restore:', e.message); }
    // Session tidak valid → hapus dan tampilkan login
    clearSession();
  }
  // Pastikan page = login sebelum render
  S.user = null;
  S.page = 'login';
  render();
}

initApp();

</script>
