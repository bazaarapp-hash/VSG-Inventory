<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIV – Sistem Inventaris Vihara</title>

  <!-- Firebase SDK v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1B4332;
      --primary-l: #2D6A4F;
      --primary-ll: #40916C;
      --accent: #C9A227;
      --accent-l: #E8C547;
      --bg: #F5F0E8;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --muted: #6B7280;
      --border: #E2DDD4;
      --danger: #DC2626;
      --success: #16A34A;
      --warn: #D97706;
      --info: #2563EB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .ff { font-family: 'Amiri', serif; }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--primary);
      width: 256px; min-height: 100vh;
      position: fixed; left: 0; top: 0;
      transition: transform .3s ease; z-index: 50;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px; cursor: pointer;
      color: rgba(255,255,255,.72); transition: all .18s;
      margin: 2px 10px; font-size: 13.5px; font-weight: 500;
      white-space: nowrap;
    }
    .nav-item:hover { background: rgba(255,255,255,.1); color: #fff; }
    .nav-item.active { background: var(--accent); color: var(--primary); font-weight: 700; }
    .nav-icon { font-size: 15px; flex-shrink: 0; }

    /* ── MAIN ── */
    .main { margin-left: 256px; min-height: 100vh; padding: 28px 28px 60px; }

    /* ── CARD ── */
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }

    /* ── BUTTONS ── */
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 500; cursor: pointer; border: none; transition: all .18s; font-family: inherit; }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover  { background: var(--primary-l); }
    .btn-accent   { background: var(--accent); color: var(--primary); font-weight: 700; }
    .btn-accent:hover   { background: var(--accent-l); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover   { filter: brightness(1.1); }
    .btn-outline  { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-outline:hover  { background: var(--primary); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover    { background: #f5f5f5; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ── FORM ── */
    .lbl { display: block; font-size: 12.5px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .inp { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; font-family: inherit; color: var(--text); background: #fff; outline: none; transition: border-color .18s; }
    .inp:focus { border-color: var(--primary-ll); }
    select.inp { cursor: pointer; }
    .fgrp { margin-bottom: 14px; }

    /* ── TABLE ── */
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th { background: var(--primary); color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: .4px; }
    .tbl th:first-child { border-radius: 8px 0 0 0; }
    .tbl th:last-child  { border-radius: 0 8px 0 0; }
    .tbl td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tbl tr:hover td { background: #F0F9F4; }
    .tbl tr:last-child td { border-bottom: none; }

    /* ── BADGES ── */
    .bdg { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .bdg-g  { background: #DCFCE7; color: #15803D; }
    .bdg-r  { background: #FEE2E2; color: #DC2626; }
    .bdg-y  { background: #FEF3C7; color: #B45309; }
    .bdg-b  { background: #DBEAFE; color: #1D4ED8; }
    .bdg-n  { background: #F3F4F6; color: #4B5563; }
    .bdg-p  { background: #F3E8FF; color: #7E22CE; }

    /* ── TOAST ── */
    #toasts { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; font-weight: 500; min-width: 270px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 18px rgba(0,0,0,.18); animation: tin .3s ease; }
    .t-ok  { background: #15803D; color: #fff; }
    .t-err { background: #DC2626; color: #fff; }
    .t-inf { background: #1D4ED8; color: #fff; }
    @keyframes tin { from { transform: translateX(110%); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }

    /* ── STAT CARD ── */
    .sc { background: var(--surface); border-radius: 12px; padding: 18px 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .sc::after { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent); }

    /* ── LOGIN ── */
    .login-wrap { min-height: 100vh; background: linear-gradient(150deg, #0A2818 0%, #1B4332 45%, #2D6A4F 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }

    /* ── SPINNER ── */
    .spin { border: 3px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; animation: rot .7s linear infinite; display: inline-block; flex-shrink: 0; }
    .spin-dk { border-color: rgba(27,67,50,.2); border-top-color: #1B4332; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── PAGE HEADER ── */
    .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
    .ph h1 { font-size: 26px; color: var(--primary); line-height: 1.2; }
    .ph p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── MOBILE ── */
    @media(max-width:768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 16px; }
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 3px; background: #EDEAE3; border-radius: 10px; padding: 4px; width: fit-content; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn { padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all .18s; background: transparent; color: var(--muted); }
    .tab-btn.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    /* radio/checkbox group */
    .radio-group { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; }
    .radio-item { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13.5px; }

    /* action btns in table */
    .act-btn { padding: 4px 11px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; border: 1px solid; transition: all .15s; }
    .act-edit { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
    .act-edit:hover { background: #DBEAFE; }
    .act-del  { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
    .act-del:hover  { background: #FEE2E2; }

    @media print {
      .sidebar, .ph button, .tabs, #filter-bar, .act-btn { display: none !important; }
      .main { margin-left: 0 !important; }
    }
  </style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="spin spin-dk" style="width:40px;height:40px;border-width:4px;"></div>
  </div>
</div>
<div id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  FIREBASE CONFIGURATION — ganti nilai di bawah ini
//  Lihat README.md untuk cara mendapatkan config Firebase
// ═══════════════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey: "AIzaSyDiKUhFGh5lFB2xWIk_6eHG2OkLsZmFI2E",
  authDomain: "inventoryvsg.firebaseapp.com",
  projectId: "inventoryvsg",
  storageBucket: "inventoryvsg.firebasestorage.app",
  messagingSenderId: "73507994905",
  appId: "1:73507994905:web:29d1c961a377bd70035988"
};

firebase.initializeApp(FB_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();
const FS   = firebase.firestore;

// ═══════════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════════
const S = {
  user   : null,
  page   : 'loading',
  item   : null,
  udata  : null,
  lapTab : 0,
  theme  : {
    appTitle    : 'SIMBA',
    appSubtitle : 'SISTEM INVENTARIS IBADAH',
    logoType    : 'emoji',
    logoEmoji   : '🕌',
    logoBase64  : '',
    colorPrimary: '#1B4332',
    colorAccent : '#C9A227',
    colorBg     : '#F5F0E8',
  }
};

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
const fmt = {
  date(ts) {
    if (!ts) return '–';
    let d = ts?.toDate?.() || (ts instanceof Date ? ts : new Date(ts));
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  },
  dt(ts) {
    if (!ts) return '–';
    let d = ts?.toDate?.() || (ts instanceof Date ? ts : new Date(ts));
    return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  },
};

function mkKode() {
  const y = String(new Date().getFullYear()).slice(-2);
  const m = String(new Date().getMonth()+1).padStart(2,'0');
  const r = Math.random().toString(36).substr(2,4).toUpperCase();
  return `BRG-${y}${m}-${r}`;
}

function roleLabel(r) {
  return {superadmin:'Super Admin', admin:'Admin', manager:'Manager Perlengkapan'}[r] || r || '–';
}

function toast(msg, type='ok') {
  const c = document.getElementById('toasts');
  const cls = {ok:'t-ok', err:'t-err', inf:'t-inf'}[type]||'t-inf';
  const icon= {ok:'✓', err:'✕', inf:'ℹ'}[type]||'ℹ';
  const el = document.createElement('div');
  el.className = `toast ${cls}`;
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 3600);
}

function can(a) {
  const r = S.user?.role;
  if (!r) return false;
  if (r === 'superadmin') return true;
  if (a === 'items')    return ['admin','manager'].includes(r);
  if (a === 'users')    return r === 'admin';
  if (a === 'reports')  return ['admin','manager'].includes(r);
  if (a === 'backup')   return false;
  return false;
}

function go(page, params={}) {
  S.page  = page;
  S.item  = params.item  || null;
  S.udata = params.udata || null;
  render();
}

// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
async function doLogin(email, pw) {
  const c = await auth.signInWithEmailAndPassword(email, pw);
  const ud = await db.collection('users').doc(c.user.uid).get();
  if (!ud.exists) { await auth.signOut(); throw new Error('Akun tidak ditemukan di sistem'); }
  if (ud.data().active === false) { await auth.signOut(); throw new Error('Akun nonaktif'); }
  return ud.data();
}

async function doLogout() {
  await auth.signOut(); S.user = null; render();
}

// ═══════════════════════════════════════════════════════════════
//  DB – ITEMS
// ═══════════════════════════════════════════════════════════════
async function dbItems() {
  const s = await db.collection('items').orderBy('createdAt','desc').get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function dbItem(id) {
  const d = await db.collection('items').doc(id).get();
  return d.exists?{id:d.id,...d.data()}:null;
}
async function dbCreateItem(data) {
  const now = FS.FieldValue.serverTimestamp();
  const ref = await db.collection('items').add({
    ...data,
    createdAt:now, createdBy:S.user.uid, createdByName:S.user.nama,
    updatedAt:now, updatedBy:S.user.uid, updatedByName:S.user.nama,
  });
  await dbLog(ref.id, data.kode, data.nama, 'tambah', {}, data);
}
async function dbUpdateItem(id, old, data) {
  const now = FS.FieldValue.serverTimestamp();
  await db.collection('items').doc(id).update({...data,updatedAt:now,updatedBy:S.user.uid,updatedByName:S.user.nama});
  await dbLog(id, data.kode, data.nama, 'edit', old, data);
}
async function dbDeleteItem(id, item) {
  await db.collection('items').doc(id).delete();
  await dbLog(id, item.kode, item.nama, 'hapus', item, {});
}

// ═══════════════════════════════════════════════════════════════
//  DB – USERS
// ═══════════════════════════════════════════════════════════════
async function dbUsers() {
  const s = await db.collection('users').orderBy('createdAt','desc').get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}
async function dbCreateUser(data) {
  // Buat secondary app agar tidak logout user yg sedang aktif
  const sec = firebase.initializeApp(FB_CONFIG, 'sec-'+Date.now());
  const secAuth = sec.auth();
  try {
    const c = await secAuth.createUserWithEmailAndPassword(data.email, data.password);
    await secAuth.signOut(); await sec.delete();
    await db.collection('users').doc(c.user.uid).set({
      uid:c.user.uid, nama:data.nama, email:data.email, role:data.role,
      createdAt:FS.FieldValue.serverTimestamp(),
      createdBy:S.user.uid, createdByName:S.user.nama, active:true,
    });
    return c.user.uid;
  } catch(e) { await sec.delete(); throw e; }
}
async function dbUpdateUser(uid, data) {
  await db.collection('users').doc(uid).update({
    nama:data.nama, role:data.role, active:data.active,
    updatedAt:FS.FieldValue.serverTimestamp(), updatedBy:S.user.uid,
  });
}
async function dbDeleteUser(uid) {
  await db.collection('users').doc(uid).delete();
}

// ═══════════════════════════════════════════════════════════════
//  DB – HISTORY
// ═══════════════════════════════════════════════════════════════
async function dbLog(itemId, kode, nama, action, old, nw) {
  await db.collection('history').add({
    itemId, itemKode:kode, itemNama:nama, action, oldData:old, newData:nw,
    userId:S.user.uid, userName:S.user.nama, userRole:S.user.role,
    timestamp:FS.FieldValue.serverTimestamp(),
  });
}
async function dbHistory() {
  const s = await db.collection('history').orderBy('timestamp','desc').limit(300).get();
  return s.docs.map(d=>({id:d.id,...d.data()}));
}

// ═══════════════════════════════════════════════════════════════
//  DB – SETTINGS (TEMA TAMPILAN)
// ═══════════════════════════════════════════════════════════════
async function dbLoadSettings() {
  try {
    const d = await db.collection('settings').doc('theme').get();
    if (d.exists) {
      Object.assign(S.theme, d.data());
    }
    applyTheme();
  } catch(e) { applyTheme(); }
}
async function dbSaveSettings(data) {
  await db.collection('settings').doc('theme').set(data, {merge:true});
  Object.assign(S.theme, data);
  applyTheme();
}

function applyTheme() {
  const t = S.theme;
  const root = document.documentElement;
  function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`;}
  function lighten(h,a){const r=Math.min(255,parseInt(h.slice(1,3),16)+a),g=Math.min(255,parseInt(h.slice(3,5),16)+a),b=Math.min(255,parseInt(h.slice(5,7),16)+a);return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
  root.style.setProperty('--primary',  t.colorPrimary);
  root.style.setProperty('--primary-l', lighten(t.colorPrimary, 30));
  root.style.setProperty('--primary-ll',lighten(t.colorPrimary, 60));
  root.style.setProperty('--accent',   t.colorAccent);
  root.style.setProperty('--accent-l', lighten(t.colorAccent, 28));
  root.style.setProperty('--bg',       t.colorBg);
  document.title = t.appTitle + ' – Inventaris';
  // Update login-wrap gradient jika ada
  document.querySelectorAll('.login-wrap').forEach(el=>{
    el.style.background = `linear-gradient(150deg, ${darken(t.colorPrimary,20)} 0%, ${t.colorPrimary} 45%, ${lighten(t.colorPrimary,25)} 100%)`;
  });
}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-a),g=Math.max(0,parseInt(h.slice(3,5),16)-a),b=Math.max(0,parseInt(h.slice(5,7),16)-a);return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}

function logoHtml(size='40px', forDark=false) {
  const t = S.theme;
  if (t.logoType === 'image' && t.logoBase64) {
    return `<img src="${t.logoBase64}" style="width:${size};height:${size};object-fit:contain;border-radius:8px">`;
  }
  return `<span style="font-size:${size}">${t.logoEmoji||'🕌'}</span>`;
}

// ═══════════════════════════════════════════════════════════════
//  DB – SETUP
// ═══════════════════════════════════════════════════════════════
async function needsSetup() {
  try {
    const s = await db.collection('users').limit(1).get();
    return s.empty;
  } catch(e) {
    console.warn('needsSetup error:', e.message);
    return false; // Asumsikan sudah ada user → tampilkan login
  }
}
async function setupSuperAdmin(nama, email, pw) {
  // Cek lagi apakah sudah ada superadmin sebelum buat
  const existing = await db.collection('users')
    .where('role','==','superadmin').limit(1).get();
  if (!existing.empty) {
    throw { code: 'superadmin-exists', message: 'Superadmin sudah terdaftar.' };
  }
  const c = await auth.createUserWithEmailAndPassword(email, pw);
  await db.collection('users').doc(c.user.uid).set({
    uid:c.user.uid, nama, email, role:'superadmin', active:true,
    createdAt:FS.FieldValue.serverTimestamp(), createdBy:c.user.uid, createdByName:nama,
  });
}

// ═══════════════════════════════════════════════════════════════
//  BACKUP / RESTORE / RESET
// ═══════════════════════════════════════════════════════════════
async function doBackup() {
  toast('Menyiapkan backup…','inf');
  try {
    const [items, users, history] = await Promise.all([
      db.collection('items').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
      db.collection('users').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
      db.collection('history').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
    ]);
    const blob = new Blob([JSON.stringify({
      exportedAt:new Date().toISOString(), exportedBy:S.user.nama, version:'1.0',
      data:{items, users, history}
    },null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup-simba-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    toast('Backup berhasil diunduh!');
  } catch(e){ toast('Gagal backup: '+e.message,'err'); }
}
async function doRestore(file) {
  try {
    const bk = JSON.parse(await file.text());
    if (!bk.data) throw new Error('Format backup tidak valid');
    toast('Memulai restore…','inf');
    const batch = db.batch();
    (bk.data.items||[]).forEach(({id,...d})=>batch.set(db.collection('items').doc(id),d));
    await batch.commit();
    toast(`Restore selesai – ${bk.data.items?.length||0} barang dipulihkan`);
    go('dashboard');
  } catch(e){ toast('Gagal restore: '+e.message,'err'); }
}
async function doReset() {
  toast('Menghapus data…','inf');
  try {
    for (const col of ['items','history']) {
      const s = await db.collection(col).get();
      const b = db.batch(); s.docs.forEach(d=>b.delete(d.ref)); await b.commit();
    }
    toast('Reset berhasil!');
    go('dashboard');
  } catch(e){ toast('Gagal reset: '+e.message,'err'); }
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (S.page === 'login') {
    app.innerHTML = tplLogin(); bindLogin();
  } else if (S.page === 'setup') {
    app.innerHTML = tplSetup(); bindSetup();
  } else {
    app.innerHTML = `<div style="display:flex">${tplSidebar()}<div class="main" style="flex:1;min-width:0;">${tplPage()}</div></div>`;
    bindPage();
  }
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════
function tplSidebar() {
  const r = S.user?.role, p = S.page;
  const navs = [
    {id:'dashboard', ic:'⊞',  lbl:'Dashboard',          roles:['superadmin','admin','manager']},
    {id:'barang',    ic:'📦', lbl:'Data Barang',         roles:['superadmin','admin','manager']},
    {id:'cari',      ic:'🔍', lbl:'Pencarian',           roles:['superadmin','admin','manager']},
    {id:'riwayat',   ic:'📋', lbl:'Riwayat Aktivitas',   roles:['superadmin','admin','manager']},
    {id:'laporan',   ic:'📊', lbl:'Laporan',             roles:['superadmin','admin']},
    {id:'pengguna',  ic:'👥', lbl:'Manajemen Pengguna',  roles:['superadmin','admin']},
    {id:'pengaturan',ic:'⚙️', lbl:'Pengaturan & Backup', roles:['superadmin']},
  ].filter(n=>n.roles.includes(r));

  return `
  <div class="sidebar" id="sidebar">
    <div style="padding:22px 16px 12px;text-align:center;">
      ${logoHtml('36px', true)}
      <div class="ff" style="color:var(--accent);font-size:26px;font-weight:700;line-height:1;margin-top:4px">${S.theme.appTitle}</div>
      <div style="color:rgba(255,255,255,.4);font-size:9px;letter-spacing:1.5px;margin-top:2px">${S.theme.appSubtitle}</div>
      <div style="height:1px;background:rgba(255,255,255,.1);margin:14px 0"></div>
    </div>
    <nav style="flex:1;padding-bottom:16px">
      ${navs.map(n=>`
        <div class="nav-item ${p===n.id?'active':''}" onclick="go('${n.id}')">
          <span class="nav-icon">${n.ic}</span>
          <span>${n.lbl}</span>
        </div>`).join('')}
    </nav>
    <div style="padding:14px;border-top:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.18);flex-shrink:0">
      <div style="color:#fff;font-size:13px;font-weight:600">${S.user?.nama||''}</div>
      <div style="color:rgba(255,255,255,.45);font-size:11px;margin:2px 0 10px">${roleLabel(r)}</div>
      <button onclick="doLogout()" class="btn btn-ghost" style="width:100%;padding:7px;font-size:12.5px;color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)">Keluar</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  PAGES
// ═══════════════════════════════════════════════════════════════
function tplPage() {
  switch(S.page) {
    case 'dashboard':    return tplDashboard();
    case 'barang':       return tplBarang();
    case 'form-barang':  return tplFormBarang();
    case 'cari':         return tplCari();
    case 'riwayat':      return tplRiwayat();
    case 'laporan':      return tplLaporan();
    case 'pengguna':     return tplPengguna();
    case 'form-pengguna':return tplFormPengguna();
    case 'pengaturan':   return tplPengaturan();
    default:             return tplDashboard();
  }
}

const JENIS_LIST = ['Perlengkapan Ibadah','Peralatan','Furnitur','Elektronik','Lainnya'];

// ── FORM BARANG ────────────────────────────────────────────────
function tplFormBarang() {
  const it = S.item, ed = !!it;
  const v = (k,d='') => it?.[k]??d;
  const vp = (k,d='') => it?.peminjaman?.[k]??d;
  const sel = (a,b) => a===b?'selected':'';
  const chk = (a,b) => a===b?'checked':'';
  return `
  <div style="max-width:780px">
    <div class="ph">
      <div><h1 class="ff">${ed?'Edit Barang':'Tambah Barang'}</h1><p>${ed?'Ubah data barang yang ada':'Input barang baru ke inventaris'}</p></div>
      <button class="btn btn-outline" onclick="go('barang')">← Kembali</button>
    </div>
    <div class="card">
      <form id="frm-barang" onsubmit="submitItem(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="fgrp">
            <label class="lbl">Kode Barang *</label>
            <input class="inp" name="kode" value="${v('kode',mkKode())}" required>
          </div>
          <div class="fgrp">
            <label class="lbl">Nama Barang *</label>
            <input class="inp" name="nama" value="${v('nama')}" required placeholder="Nama barang">
          </div>
          <div class="fgrp">
            <label class="lbl">Jenis *</label>
            <select class="inp" name="jenis" required>
              <option value="">Pilih jenis…</option>
              ${JENIS_LIST.map(j=>`<option ${sel(v('jenis'),j)}>${j}</option>`).join('')}
            </select>
          </div>
          <div class="fgrp">
            <label class="lbl">Jumlah *</label>
            <input class="inp" type="number" name="jumlah" value="${v('jumlah',1)}" min="0" required>
          </div>
          <div class="fgrp">
            <label class="lbl">Tanggal Diperoleh</label>
            <input class="inp" type="date" name="tanggalDiperoleh" value="${v('tanggalDiperoleh')}">
          </div>
          <div class="fgrp">
            <label class="lbl">Diperoleh Dari</label>
            <input class="inp" name="diperolehDari" value="${v('diperolehDari')}" placeholder="Nama donatur / lembaga">
          </div>
          <div class="fgrp" style="grid-column:1/-1">
            <label class="lbl">Lokasi Penempatan</label>
            <input class="inp" name="lokasi" value="${v('lokasi')}" placeholder="Contoh: Ruang Utama, Gudang, Selasar…">
          </div>

          <!-- STATUS -->
          <div class="fgrp">
            <label class="lbl">Status / Kondisi *</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="status" value="aktif" ${chk(v('status','aktif'),'aktif')}> 
                <span class="bdg bdg-g">✓ Masih Digunakan</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="status" value="rusak" ${chk(v('status','aktif'),'rusak')}>
                <span class="bdg bdg-r">✕ Rusak</span>
              </label>
            </div>
          </div>

          <!-- PERAWATAN -->
          <div class="fgrp">
            <label class="lbl">Jadwal Perawatan</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="jadwal" value="ada" ${chk(v('jadwalPerawatan','tidak'),'ada')} onchange="toggleSection('sec-rawat',this.value==='ada')">
                Ada Perawatan
              </label>
              <label class="radio-item">
                <input type="radio" name="jadwal" value="tidak" ${chk(v('jadwalPerawatan','tidak'),'tidak')} onchange="toggleSection('sec-rawat',false)">
                Tidak Ada
              </label>
            </div>
          </div>

          <div id="sec-rawat" style="grid-column:1/-1;${v('jadwalPerawatan','tidak')==='ada'?'':'display:none'}">
            <label class="lbl">Detail Jadwal Perawatan</label>
            <input class="inp" name="detailPerawatan" value="${v('detailPerawatan')}" placeholder="Contoh: Setiap 3 bulan – pengecekan rutin">
          </div>

          <!-- PEMINJAMAN -->
          <div class="fgrp" style="grid-column:1/-1">
            <label class="lbl">Status Peminjaman</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="dipinjam" value="ya" ${vp('dipinjam',false)?'checked':''} onchange="toggleSection('sec-pinjam',true)">
                <span class="bdg bdg-y">Sedang Dipinjam</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="dipinjam" value="tidak" ${!vp('dipinjam',false)?'checked':''} onchange="toggleSection('sec-pinjam',false)">
                <span class="bdg bdg-n">Tersedia</span>
              </label>
            </div>
          </div>

          <div id="sec-pinjam" style="grid-column:1/-1;display:${vp('dipinjam',false)?'grid':'none'};grid-template-columns:1fr 1fr;gap:14px">
            <div class="fgrp">
              <label class="lbl">Jumlah Dipinjam</label>
              <input class="inp" type="number" name="jmlPinjam" value="${vp('jumlahDipinjam',1)}" min="1">
            </div>
            <div class="fgrp">
              <label class="lbl">Nama Peminjam</label>
              <input class="inp" name="peminjam" value="${vp('peminjam')}" placeholder="Nama orang / organisasi">
            </div>
          </div>

        </div>
        <div style="display:flex;gap:10px;padding-top:14px;border-top:1px solid var(--border);margin-top:4px">
          <button type="submit" class="btn btn-accent" id="sbmt-btn">${ed?'💾 Simpan Perubahan':'+ Tambah Barang'}</button>
          <button type="button" class="btn btn-outline" onclick="go('barang')">Batal</button>
        </div>
      </form>
    </div>
  </div>`;
}

  <div class="card" id="sc-result" style="min-height:160px;display:flex;align-items:center;justify-content:center">

// ── LAPORAN ────────────────────────────────────────────────────
function tplLaporan() {
  const tabs = ['Jenis','Lokasi','Status','Peminjaman','Pencatatan'];
  return `
  <div class="ph">
    <div><h1 class="ff">Laporan Inventaris</h1><p>Analisis dan ringkasan data barang</p></div>
    <button class="btn btn-outline" onclick="window.print()">🖨️ Cetak</button>
  </div>
  <div class="tabs">
    ${tabs.map((t,i)=>`<button class="tab-btn ${i===S.lapTab?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('')}
  </div>

}

// ── PENGGUNA ───────────────────────────────────────────────────
function tplPengguna() {
  return `
  <div class="ph">
    <div><h1 class="ff">Manajemen Pengguna</h1><p>Kelola akun Admin dan Manager</p></div>
    <button class="btn btn-accent" onclick="go('form-pengguna')">+ Tambah Pengguna</button>
  </div>
  <div class="card" style="overflow-x:auto"><div id="usr-tbl">Memuat…</div></div>`;
}

// ── FORM PENGGUNA ──────────────────────────────────────────────
function tplFormPengguna() {
  const u = S.udata, ed = !!u;
  const cur = S.user?.role;
  const roles = cur==='superadmin'
    ? [['admin','Admin'],['manager','Manager Perlengkapan']]
    : [['manager','Manager Perlengkapan']];
  return `
  <div style="max-width:480px">
    <div class="ph">
      <div><h1 class="ff">${ed?'Edit Pengguna':'Tambah Pengguna'}</h1></div>
      <button class="btn btn-outline" onclick="go('pengguna')">← Kembali</button>
    </div>
    <div class="card">
      <form id="frm-usr" onsubmit="submitUser(event)">
        <div class="fgrp"><label class="lbl">Nama Lengkap *</label>
          <input class="inp" name="nama" value="${u?.nama||''}" required>
        </div>
        ${!ed?`
        <div class="fgrp"><label class="lbl">Email *</label>
          <input class="inp" type="email" name="email" required>
        </div>
        <div class="fgrp"><label class="lbl">Password *</label>
          <input class="inp" type="password" name="password" required minlength="6" placeholder="Minimal 6 karakter">
        </div>`:''}
        <div class="fgrp"><label class="lbl">Role *</label>
          <select class="inp" name="role" required>
            ${roles.map(([v,l])=>`<option value="${v}" ${u?.role===v?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        ${ed?`<div class="fgrp"><label class="lbl">Status Akun</label>
          <select class="inp" name="active">
            <option value="true" ${u?.active!==false?'selected':''}>Aktif</option>
            <option value="false" ${u?.active===false?'selected':''}>Nonaktif</option>
          </select>
        </div>`:''}
        <div style="display:flex;gap:10px;margin-top:6px">
          <button type="submit" class="btn btn-accent">${ed?'💾 Simpan':'+ Tambah'}</button>
          <button type="button" class="btn btn-outline" onclick="go('pengguna')">Batal</button>
        </div>
      </form>
    </div>
  </div>`;
}

// ── PENGATURAN ─────────────────────────────────────────────────
function tplPengaturan() {
  const t = S.theme;
  const EMOJIS = ['🕌','🕍','⛪','🛕','🏛️','⭐','☪️','✝️','☸️','🌙','🔯','🙏'];
  return `

  <!-- ══ TAMPILAN APLIKASI ══ -->
  <div class="card" style="margin-bottom:20px">
    <h3 style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px">🎨 Tampilan Aplikasi</h3>

      <!-- LOGO -->
      <div style="grid-column:1/-1">
        <div class="lbl">Logo Aplikasi</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;margin-top:6px">
          <!-- Preview logo saat ini -->
          <div style="width:72px;height:72px;border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;background:#F9F7F2;flex-shrink:0" id="logo-preview">
            ${logoHtml('42px')}
          </div>
          <div>
            <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">Pilih emoji atau upload gambar</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
              ${EMOJIS.map(em => `<button onclick="setLogoEmoji('${em}')" style="width:34px;height:34px;font-size:20px;cursor:pointer;border-radius:8px;border:2px solid ${t.logoEmoji===em&&t.logoType==='emoji'?'var(--accent)':'var(--border)'};background:${t.logoEmoji===em&&t.logoType==='emoji'?'#FEF3C7':'#fff'};transition:all .15s">${em}</button>`).join('')}
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <label class="btn btn-outline" style="cursor:pointer;font-size:12.5px;padding:6px 12px">
                📁 Upload Gambar
                <input type="file" accept="image/*" style="display:none" onchange="uploadLogoImage(this)">
              </label>
              ${t.logoType==='image'?`<button class="btn btn-ghost" style="font-size:12.5px;padding:6px 12px" onclick="resetLogoEmoji()">Kembali ke Emoji</button>`:''}
            </div>
          </div>
        </div>
      </div>

      <!-- JUDUL -->
      <div class="fgrp">
        <label class="lbl">Nama / Judul Aplikasi</label>
        <input class="inp" id="th-title" value="${t.appTitle}" placeholder="Contoh: SIMBA">
      </div>
      <div class="fgrp">
        <label class="lbl">Sub-judul (Tagline)</label>
        <input class="inp" id="th-sub" value="${t.appSubtitle}" placeholder="Contoh: SISTEM INVENTARIS IBADAH">
      </div>

      <!-- WARNA -->
      <div class="fgrp">
        <label class="lbl">Warna Utama (Sidebar)</label>

      <button class="btn btn-danger" onclick="confirmReset()">🗑️ Reset Data</button>
    </div>
  </div>

  <div class="card" style="background:#F0FDF4;border-color:#86EFAC">
    <h3 style="font-size:13.5px;font-weight:600;color:var(--primary);margin-bottom:8px">🔒 Firestore Security Rules</h3>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:8px">Salin rules ini ke <strong>Firebase Console → Firestore Database → Rules</strong>:</p>
    <pre style="background:#1B4332;color:#86EFAC;padding:14px;border-radius:10px;font-size:11.5px;overflow-x:auto;line-height:1.6">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function isAuth()       { return request.auth != null; }
    function getU()         { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data; }
    function isSuperAdmin() { return isAuth() && getU().role == 'superadmin'; }
    function isAdmin()      { return isAuth() && getU().role in ['superadmin','admin']; }
    function isActive()     { return isAuth() && getU().active != false; }

    match /users/{uid} {
      // list tanpa login hanya untuk cek apakah setup diperlukan
      allow list:   if true;
      allow get:    if isAuth();
      // create: saat setup awal (belum ada user) ATAU oleh admin
      allow create: if isAdmin()
                    || (!isAuth() && !exists(/databases/$(database)/documents/users/$(uid)));
      allow update: if isAdmin();
      allow delete: if isAdmin();
    }
    match /items/{id} {
      allow read:   if isActive();
      allow create: if isActive();
      allow update: if isActive();
      allow delete: if isActive();
    }
    match /history/{id} {
      allow read:   if isActive();
      allow create: if isActive();
      allow delete: if isSuperAdmin();
    }
    match /settings/{doc} {
      allow read:   if true;
      allow write:  if isSuperAdmin();
    }
  }
}</pre>
  </div>`;
}

// ─ login ────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-err');
  btn.innerHTML = '<span class="spin"></span> Masuk…'; btn.disabled = true;
  err.style.display = 'none';
  try {
    S.user = await doLogin(document.getElementById('l-email').value, document.getElementById('l-pw').value);
    go('dashboard');
  } catch(ex) {
    const m = {
      'auth/user-not-found':'Email tidak terdaftar',
      'auth/wrong-password':'Password salah',
      'auth/invalid-email':'Format email tidak valid',
      'auth/too-many-requests':'Terlalu banyak percobaan, tunggu sebentar',
      'auth/invalid-credential':'Email atau password salah',
    };
    err.textContent = m[ex.code] || ex.message;
    err.style.display = 'block';
    btn.innerHTML = 'Masuk ke ' + S.theme.appTitle; btn.disabled = false;
  }
}

async function handleSetup(e) {
  e.preventDefault();
  const err = document.getElementById('su-err');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Membuat akun…';
  try {
    await setupSuperAdmin(
      document.getElementById('su-nama').value,
      document.getElementById('su-email').value,
      document.getElementById('su-pw').value
    );
    toast('Super Admin dibuat! Silakan login.');
    S.page = 'login'; render();
  } catch(ex) {
    // Jika superadmin sudah ada ATAU email sudah terpakai → langsung ke login
    if (ex.code === 'superadmin-exists' || ex.code === 'auth/email-already-in-use') {
      toast('Akun Super Admin sudah terdaftar. Silakan login.', 'inf');
      S.page = 'login'; render();
      return;
    }
    const m = {
      'auth/weak-password'  : 'Password minimal 6 karakter',
      'auth/invalid-email'  : 'Format email tidak valid',
    };
    err.textContent = m[ex.code] || ex.message;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Buat Akun Super Admin';
  }
}

// ─ submit barang ─────────────────────────────────────────────
async function submitItem(e) {
  e.preventDefault();
  const f = e.target, btn = document.getElementById('sbmt-btn');
  const dp = f.dipinjam.value === 'ya';
  const data = {
    kode:              f.kode.value.trim(),
    nama:              f.nama.value.trim(),
    jenis:             f.jenis.value,
    jumlah:            parseInt(f.jumlah.value),
    tanggalDiperoleh:  f.tanggalDiperoleh.value,
    diperolehDari:     f.diperolehDari.value.trim(),
    lokasi:            f.lokasi.value.trim(),
    status:            f.status.value,
    jadwalPerawatan:   f.jadwal.value,
    detailPerawatan:   f.detailPerawatan?.value?.trim() || '',
    peminjaman: {
      dipinjam:       dp,
      jumlahDipinjam: dp ? parseInt(f.jmlPinjam?.value||0) : 0,
      peminjam:       dp ? (f.peminjam?.value?.trim()||'') : '',
    },
  };
  btn.disabled = true; btn.textContent = 'Menyimpan…';
  try {
    if (S.item) { await dbUpdateItem(S.item.id, S.item, data); toast('Barang diperbarui!'); }
    else        { await dbCreateItem(data); toast('Barang ditambahkan!'); }
    go('barang');
  } catch(ex) { toast('Gagal: '+ex.message,'err'); btn.disabled=false; btn.textContent=S.item?'💾 Simpan Perubahan':'+ Tambah Barang'; }
}

// ─ submit user ───────────────────────────────────────────────
async function submitUser(e) {
  e.preventDefault();
  const f = e.target;
  try {
    if (S.udata) {
      await dbUpdateUser(S.udata.uid||S.udata.id, {
        nama:f.nama.value.trim(), role:f.role.value, active:f.active?.value==='true',
      });
      toast('Pengguna diperbarui!');
    } else {
      await dbCreateUser({nama:f.nama.value.trim(),email:f.email.value.trim(),password:f.password.value,role:f.role.value});
      toast('Pengguna ditambahkan!');
    }
    go('pengguna');
  } catch(ex) {
    const m={'auth/email-already-in-use':'Email sudah digunakan','auth/weak-password':'Password terlalu lemah'};
    toast(m[ex.code]||ex.message,'err');
  }
}

// ═══════════════════════════════════════════════════════════════
//  DATA LOADERS
// ═══════════════════════════════════════════════════════════════
async function loadDashboard() {
  // Ambil items dan history secara terpisah agar satu gagal tidak blokir semua
  let items = [], hist = [];

  try { items = await dbItems(); }
  catch(e) {
    console.error('items error:', e.code, e.message);
    const st = document.getElementById('stats');
    if (st) {
      const msg = e.code === 'permission-denied'
        ? '⚠️ Akses ditolak Firestore. Pastikan Security Rules sudah dipublish dan akun aktif.'
        : '⚠️ Gagal memuat barang: ' + e.message;
      st.innerHTML = `<div style="grid-column:1/-1;padding:14px;background:#FEF2F2;border-radius:10px;color:var(--danger);font-size:13px">${msg}</div>`;
    }
  }

  try { hist = await dbHistory(); }
  catch(e) { console.error('history error:', e.code, e.message); }

  // ── Stats ──
  const total  = items.length;
  const rusak  = items.filter(i=>i.status==='rusak').length;
  const pinjam = items.filter(i=>i.peminjaman?.dipinjam).length;
  const rawat  = items.filter(i=>i.jadwalPerawatan==='ada').length;

  const st = document.getElementById('stats');
  if (st) {
    st.innerHTML = [
      {ic:'📦', lbl:'Total Barang',     val:total,       col:'var(--primary)'},
      {ic:'✅', lbl:'Masih Digunakan',  val:total-rusak,  col:'var(--success)'},
      {ic:'🔴', lbl:'Kondisi Rusak',    val:rusak,        col:'var(--danger)'},
      {ic:'🔄', lbl:'Sedang Dipinjam',  val:pinjam,       col:'var(--warn)'},
      {ic:'🔧', lbl:'Ada Jadwal Rawat', val:rawat,        col:'var(--info)'},
    ].map(s=>`
      <div class="sc">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:26px;font-weight:700;color:${s.col}">${s.val}</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:3px">${s.lbl}</div>
          </div>
          <div style="font-size:28px">${s.ic}</div>
        </div>
      </div>`).join('');
  }

  // ── Aktivitas Terbaru ──
  const rec = document.getElementById('recent');
  if (rec) {
    if (!hist.length) {
      rec.innerHTML = '<p style="color:var(--muted);font-size:13px">Belum ada aktivitas</p>';
    } else {
      rec.innerHTML = hist.slice(0,8).map(h=>`
        <div style="display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:15px">${h.action==='tambah'?'➕':h.action==='edit'?'✏️':'🗑️'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.itemNama||'–'}</div>
            <div style="font-size:11px;color:var(--muted)">${h.action.toUpperCase()} – ${h.userName} • ${fmt.dt(h.timestamp)}</div>
          </div>
        </div>`).join('');
    }
  }

  // ── Perlu Perhatian ──
  const at = document.getElementById('attn');
  if (at) {
    const rusakItems  = items.filter(i=>i.status==='rusak');
    const pinjamItems = items.filter(i=>i.peminjaman?.dipinjam);
    let html = '';
    if (rusakItems.length) html += `
      <div style="font-size:11.5px;font-weight:700;color:var(--danger);margin-bottom:5px">🔴 RUSAK (${rusakItems.length})</div>
      ${rusakItems.slice(0,4).map(i=>`<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">${i.nama} <span style="color:var(--muted);font-size:11px">${i.lokasi||''}</span></div>`).join('')}
      ${rusakItems.length>4?`<div style="font-size:11px;color:var(--muted);margin-top:3px">+${rusakItems.length-4} lainnya</div>`:''}
      <div style="height:10px"></div>`;
    if (pinjamItems.length) html += `
      <div style="font-size:11.5px;font-weight:700;color:var(--warn);margin-bottom:5px">🟡 DIPINJAM (${pinjamItems.length})</div>
      ${pinjamItems.slice(0,4).map(i=>`<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">${i.nama} <span style="color:var(--muted);font-size:11px">→ ${i.peminjaman?.peminjam||'–'}</span></div>`).join('')}`;
    at.innerHTML = html || '<p style="color:var(--muted);font-size:13px">Tidak ada item yang perlu perhatian 🎉</p>';
  }
}

function renderItemsTable(items) {

          <td style="font-weight:500">${it.nama}</td>
          <td style="font-size:12px">${it.jenis||'–'}</td>
          <td>${it.jumlah||0}</td>
          <td style="font-size:12px;color:var(--muted)">${it.lokasi||'–'}</td>

              ?`<span class="bdg bdg-y" style="font-size:10.5px">📤 ${it.peminjaman.peminjam||'–'} (${it.peminjaman.jumlahDipinjam||0})</span>`

          <td>
            <div style="display:flex;gap:5px">
              <button class="act-btn act-edit" onclick="editItem('${it.id}')">Edit</button>
              <button class="act-btn act-del" onclick="delItem('${it.id}','${it.nama.replace(/'/g,"\\'")}')">Hapus</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function filterItems() {
  const q  = document.getElementById('f-q')?.value.toLowerCase()||'';
  const jn = document.getElementById('f-jenis')?.value||'';
  const st = document.getElementById('f-status')?.value||'';
  const pn = document.getElementById('f-pinjam')?.value||'';
  renderItemsTable(_items.filter(it=>{
    if (q  && !it.nama?.toLowerCase().includes(q) && !it.kode?.toLowerCase().includes(q)) return false;
    if (jn && it.jenis!==jn) return false;
    if (st && it.status!==st) return false;
    if (pn==='dipinjam' && !it.peminjaman?.dipinjam) return false;
    if (pn==='tersedia'  &&  it.peminjaman?.dipinjam) return false;
    return true;
  }));
}

function resetFilter() {
  ['f-q','f-jenis','f-status','f-pinjam'].forEach(id=>{ const e=document.getElementById(id); if(e)e.value=''; });
  renderItemsTable(_items);
}

async function editItem(id) {
  const it = _items.find(i=>i.id===id) || await dbItem(id);
  go('form-barang', {item:it});
}

function delItem(id, nama) {
  if (!confirm(`Hapus barang "${nama}"?\n\nTindakan ini akan dicatat ke riwayat.`)) return;
  const it = _items.find(i=>i.id===id);
  dbDeleteItem(id, it)
    .then(()=>{ toast('Barang dihapus'); loadItems(); })
    .catch(e=>toast('Gagal: '+e.message,'err'));
}

async function doSearch() {
  const q    = document.getElementById('sc-q')?.value.toLowerCase()||'';
  const jn   = document.getElementById('sc-jenis')?.value||'';
  const lok  = document.getElementById('sc-lok')?.value.toLowerCase()||'';
  const dari = document.getElementById('sc-dari')?.value.toLowerCase()||'';
  const t1   = document.getElementById('sc-t1')?.value||'';
  const t2   = document.getElementById('sc-t2')?.value||'';
  const st   = document.getElementById('sc-status')?.value||'';
  const rw   = document.getElementById('sc-rawat')?.value||'';
  const pn   = document.getElementById('sc-pinjam')?.value||'';

  const el = document.getElementById('sc-result');
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:40px;gap:10px"><div class="spin spin-dk"></div><span style="color:var(--muted)">Mencari…</span></div>';

  try {
    const all = await dbItems();
    const res = all.filter(it=>{
      if (q    && !it.nama?.toLowerCase().includes(q) && !it.kode?.toLowerCase().includes(q)) return false;
      if (jn   && it.jenis!==jn) return false;
      if (lok  && !it.lokasi?.toLowerCase().includes(lok)) return false;
      if (dari && !it.diperolehDari?.toLowerCase().includes(dari)) return false;
      if (st   && it.status!==st) return false;
      if (rw   && it.jadwalPerawatan!==rw) return false;
      if (pn==='dipinjam' && !it.peminjaman?.dipinjam) return false;
      if (pn==='tersedia'  &&  it.peminjaman?.dipinjam) return false;
      if (t1   && it.tanggalDiperoleh && it.tanggalDiperoleh < t1) return false;
      if (t2   && it.tanggalDiperoleh && it.tanggalDiperoleh > t2) return false;
      return true;
    });

    if (!res.length) { el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">Tidak ada barang yang cocok dengan kriteria pencarian</p>'; return; }

    el.innerHTML = `
      <div style="margin-bottom:10px;font-size:13px;color:var(--muted)">Ditemukan <strong>${res.length}</strong> barang</div>
      <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>Kode</th><th>Nama</th><th>Jenis</th><th>Jml</th><th>Lokasi</th><th>Tgl Diperoleh</th><th>Dari</th><th>Perawatan</th><th>Status</th><th>Peminjaman</th></tr></thead>
        <tbody>
        ${res.map(it=>`<tr>
          <td style="font-family:monospace;font-size:11px">${it.kode||'–'}</td>
          <td style="font-weight:500">${it.nama}</td>
          <td style="font-size:12px">${it.jenis||'–'}</td>
          <td>${it.jumlah||0}</td>
          <td style="font-size:12px">${it.lokasi||'–'}</td>
          <td style="font-size:12px">${it.tanggalDiperoleh||'–'}</td>
          <td style="font-size:12px">${it.diperolehDari||'–'}</td>
          <td><span class="bdg ${it.jadwalPerawatan==='ada'?'bdg-b':'bdg-n'}" style="font-size:10px">${it.jadwalPerawatan==='ada'?'Ada':'–'}</span></td>
          <td><span class="bdg ${it.status==='rusak'?'bdg-r':'bdg-g'}" style="font-size:10px">${it.status==='rusak'?'Rusak':'Aktif'}</span></td>
          <td style="font-size:11px">${it.peminjaman?.dipinjam?`<span class="bdg bdg-y" style="font-size:10px">${it.peminjaman.peminjam||'–'}</span>`:'<span class="bdg bdg-n" style="font-size:10px">Tersedia</span>'}</td>
        </tr>`).join('')}
        </tbody>
      </table>
      </div>`;
  } catch(e){ el.innerHTML=`<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

function resetSearch() {
  ['sc-q','sc-jenis','sc-lok','sc-dari','sc-t1','sc-t2','sc-status','sc-rawat','sc-pinjam'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});

        </tbody>

  } catch(e){ el.innerHTML=`<p style="color:var(--danger)">Error: ${e.message}</p>`; }

function exportCSV() {
  const h = _histCache;
  if (!h.length) { toast('Belum ada data','inf'); return; }
  const rows = [['Waktu','Aksi','Nama Barang','Kode','Oleh','Role'],...h.map(x=>[
    fmt.dt(x.timestamp), x.action, x.itemNama, x.itemKode, x.userName, roleLabel(x.userRole)
  ])];
  const csv = rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `riwayat-simba-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Export CSV berhasil!');
}

function switchTab(i) {
  S.lapTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,idx)=>{
    b.classList.toggle('active', idx===i);
  });
  loadLaporan(i);
}

function grpBy(arr, key) {
  return arr.reduce((a,v)=>{ const k=v[key]||'Tidak Diketahui'; (a[k]=a[k]||[]).push(v); return a; }, {});
}

async function loadLaporan(tab) {
  const el = document.getElementById('lap-body');
  if (!el) return;
  el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Memuat laporan…</p>';
  try {
    const items = await dbItems();
    let html = '';

    if (tab===0) {
      html = renderLapGroup(grpBy(items,'jenis'),'Laporan per Jenis Barang');
    } else if (tab===1) {
      html = renderLapGroup(grpBy(items,'lokasi'),'Laporan per Lokasi Penempatan');
    } else if (tab===2) {
      html = renderLapGroup({
        'Masih Digunakan': items.filter(i=>i.status!=='rusak'),
        'Rusak':           items.filter(i=>i.status==='rusak'),
      },'Laporan per Status / Kondisi');
    } else if (tab===3) {
      html = renderLapGroup({
        'Sedang Dipinjam': items.filter(i=>i.peminjaman?.dipinjam),
        'Tersedia':        items.filter(i=>!i.peminjaman?.dipinjam),
      },'Laporan Peminjaman');
    } else if (tab===4) {
      const hist = await dbHistory();
      const bu = grpBy(hist,'userName');
      html = `<div class="card">
        <h3 style="font-size:15px;font-weight:600;color:var(--primary);margin-bottom:16px">📝 Riwayat Pencatatan per Pengguna</h3>
        ${Object.entries(bu).map(([name,acts])=>`
          <div style="margin-bottom:14px;padding:14px;background:var(--bg);border-radius:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div>
                <div style="font-weight:600">${name}</div>
                <div style="font-size:12px;color:var(--muted)">${roleLabel(acts[0]?.userRole)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:22px;font-weight:700;color:var(--primary)">${acts.length}</div>
                <div style="font-size:11px;color:var(--muted)">total aktivitas</div>
              </div>
            </div>
            <div style="display:flex;gap:7px;flex-wrap:wrap">
              <span class="bdg bdg-g">Tambah: ${acts.filter(a=>a.action==='tambah').length}</span>
              <span class="bdg bdg-b">Edit: ${acts.filter(a=>a.action==='edit').length}</span>
              <span class="bdg bdg-r">Hapus: ${acts.filter(a=>a.action==='hapus').length}</span>
            </div>
          </div>`).join('')}
      </div>`;
    }
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

// ── Color helpers ────────────────────────────────────────────
function setColor(type, hex) {
  if (type === 'primary') {
    const el = document.getElementById('th-primary');
    const hx = document.getElementById('th-primary-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  } else if (type === 'accent') {
    const el = document.getElementById('th-accent');
    const hx = document.getElementById('th-accent-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  } else if (type === 'bg') {
    const el = document.getElementById('th-bg');
    const hx = document.getElementById('th-bg-hex');
    if (el) el.value = hex;
    if (hx) hx.value = hex;
  }
  previewColor();
}

function previewColor() {
  const p  = document.getElementById('th-primary')?.value || S.theme.colorPrimary;
  const a  = document.getElementById('th-accent')?.value  || S.theme.colorAccent;
  const bg = document.getElementById('th-bg')?.value      || S.theme.colorBg;
  const ttl = document.getElementById('th-title')?.value  || S.theme.appTitle;
  const sub = document.getElementById('th-sub')?.value    || S.theme.appSubtitle;

  // Sync hex inputs
  const phx=document.getElementById('th-primary-hex'); if(phx&&document.activeElement!==phx) phx.value=p;
  const ahx=document.getElementById('th-accent-hex');  if(ahx&&document.activeElement!==ahx) ahx.value=a;
  const bhx=document.getElementById('th-bg-hex');      if(bhx&&document.activeElement!==bhx) bhx.value=bg;

  // Update CSS live
  document.documentElement.style.setProperty('--primary', p);
  document.documentElement.style.setProperty('--primary-l', lighten(p,30));
  document.documentElement.style.setProperty('--primary-ll', lighten(p,60));
  document.documentElement.style.setProperty('--accent', a);
  document.documentElement.style.setProperty('--accent-l', lighten(a,28));
  document.documentElement.style.setProperty('--bg', bg);

  // Update preview panel
  const prev = document.getElementById('theme-preview');
  if (prev) {
    const tempTheme = { ...S.theme, colorPrimary:p, colorAccent:a, colorBg:bg, appTitle:ttl, appSubtitle:sub };
    const orig = S.theme;
    S.theme = tempTheme;
    prev.innerHTML = tplThemePreview();
    S.theme = orig;
  }
}

function setLogoEmoji(em) {
  S.theme.logoType  = 'emoji';
  S.theme.logoEmoji = em;
  // Refresh preview & emoji buttons
  const prev = document.getElementById('logo-preview');
  if (prev) prev.innerHTML = logoHtml('42px');
  // Re-render pengaturan page to update selected state
  go('pengaturan');
}

function resetLogoEmoji() {
  S.theme.logoType   = 'emoji';
  S.theme.logoBase64 = '';
  go('pengaturan');
}

function uploadLogoImage(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  if (file.size > 500 * 1024) { toast('Ukuran gambar max 500KB', 'err'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    S.theme.logoType   = 'image';
    S.theme.logoBase64 = e.target.result;
    const prev = document.getElementById('logo-preview');
    if (prev) prev.innerHTML = logoHtml('42px');
    go('pengaturan');
    toast('Logo diupload, klik Simpan Tema untuk menyimpan');
  };
  reader.readAsDataURL(file);
}

  const def = {
    appTitle    : 'SIMBA',
    appSubtitle : 'SISTEM INVENTARIS IBADAH',
    logoType    : 'emoji',
    logoEmoji   : '🕌',
    logoBase64  : '',
    colorPrimary: '#1B4332',
    colorAccent : '#C9A227',
    colorBg     : '#F5F0E8',
  };
  try {
    await dbSaveSettings(def);
    toast('Tema direset ke default');
    render();
  } catch(e) { toast('Gagal reset: ' + e.message, 'err'); }
}

// ═══════════════════════════════════════════════════════════════
//  AUTH STATE LISTENER – INIT
// ═══════════════════════════════════════════════════════════════
async function safeNeedsSetup() {
  try {
    return await needsSetup();
  } catch(e) {
    // Jika rules memblok, asumsikan sudah ada user → tampilkan login
    console.warn('Setup check blocked by rules, showing login:', e.message);
    return false;
  }
}

// Flag agar auth listener tidak terpanggil ganda
let _authHandled = false;

auth.onAuthStateChanged(async (fbUser) => {
  // Muat tema terlebih dahulu (bisa diakses publik)
  try { await dbLoadSettings(); } catch(e) { /* tema default saja */ }

  if (fbUser) {
    try {
      const doc = await db.collection('users').doc(fbUser.uid).get();
      if (doc.exists && doc.data().active !== false) {
        S.user = { uid: fbUser.uid, ...doc.data() };
        if (S.page === 'loading' || S.page === 'login' || S.page === 'setup') {
          go('dashboard');
        } else {
          render(); // sudah di halaman lain, render ulang sidebar saja
        }
      } else {
        await auth.signOut();
        // Akun tidak aktif atau tidak ada di Firestore
        toast('Akun tidak aktif atau tidak ditemukan.', 'err');
        S.user = null;
        S.page = 'login';
        render();
      }
    } catch(e) {
      console.error('Auth state error:', e.message);
      if (e.code === 'permission-denied') {
        // Mungkin rules belum dipublish — tetap tampilkan login
        toast('Periksa Firestore Security Rules Anda.', 'err');
      }
      S.page = 'login';
      render();
    }
  } else {
    S.user = null;
    const setup = await safeNeedsSetup();
    S.page = setup ? 'setup' : 'login';
    render();
  }
});
</script>
